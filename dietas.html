<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas Fitness PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>


<a href="index.html" class="back-btn">⬅ Volver</a>


<!-- NAVBAR -->  
<nav class="navbar">
  <div class="nav-container">

    <div class="logo">
      <img src="imagenes/logoGitHub.png">
    </div>

    <!-- BOTÓN HAMBURGUESA -->
    <div class="menu-toggle" onclick="toggleMenu()">
      ☰
    </div>

    <!-- LINKS -->
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Inicio</a></li>
      <li><a href="#dieta">Dieta</a></li>
      <li><a href="#pro">PRO</a></li>
    </ul>

  </div>
</nav>

  
  
<section class="hero">
  <h1>🥗 Genera tu dieta personalizada</h1>
  <p>Basada en tu cuerpo y objetivo</p>
</section>

<!-- DIETA GRATIS -->
<section id="dieta">
  <h2>🔥 Dieta base automática</h2>

  <div class="calculadora">
    <input type="number" id="pesoDieta" placeholder="Peso (kg)">
    <input type="number" step="0.01" id="alturaDieta" placeholder="Altura (1.80 o 180)">
    <input type="number" id="edadDieta" placeholder="Edad">

    <select id="objetivoDieta">
      <option value="definicion">Definición</option>
      <option value="volumen">Volumen</option>
    </select>

    <button onclick="generarDieta()">Generar dieta</button>

    <div id="resultadoDieta" class="dieta-card"></div>
  </div>
</section>

<!-- DIETA PRO -->
<section class="lead-box"  id="pro">
  <h2>🔥 Lleva esto al siguiente nivel</h2>
  <p>Te hago tu dieta EXACTA + seguimiento</p>

  <input type="text" id="nombreLead" placeholder="Tu nombre">
  <input type="text" id="whatsLead" placeholder="Tu WhatsApp">


<p class="contador">
🔥 Más de <span id="contadorUsuarios">147</span> personas ya generaron su dieta
</p>


  
  <button onclick="enviarWhats()">📲 Quiero mi dieta PRO</button>
</section>


<p class="urgencia">
⚠️ Solo quedan <span id="cupos">3</span> cupos para dieta personalizada hoy
</p>

  

<!-- SECCIONES DE SCRIPTS -->
<script>     
function generarDieta(){
  let peso = document.getElementById("pesoDieta").value;

  if(!peso){
    document.getElementById("resultadoDieta").innerHTML = "Ingresa tu peso";
    return;
  }

  let contenedor = document.getElementById("resultadoDieta");

  // ANIMACIÓN
  contenedor.innerHTML = `
    <div class="loading">
      🔥 Calculando tu dieta...
    </div>
  `;

  // Delay fake (efecto psicológico)
  setTimeout(() => {

    let proteina = peso * 2;

    contenedor.innerHTML = `
      <div class="dieta-card">
        <div class="card-header">
          <h3>🔥 Tu plan personalizado</h3>
          <p>${proteina}g proteína diaria</p>
        </div>

        <div class="card-meal">
          <h4>🥣 Desayuno</h4>
          <ul>
            <li>4 claras + 2 huevos</li>
            <li>50g avena</li>
          </ul>
        </div>

        <div class="card-meal">
          <h4>🍗 Comida</h4>
          <ul>
            <li>150g pollo</li>
            <li>100g arroz</li>
          </ul>
        </div>

        <div class="card-meal">
          <h4>🥩 Cena</h4>
          <ul>
            <li>150g carne</li>
            <li>verduras libres</li>
          </ul>
        </div>

        <div class="card-macros">
          🔥 Proteína: ${proteina}g
        </div>
      </div>
    `;

  }, 1500); // 1.5 segundos
}
</script>   



<!-- SECCIONES DE CONTADOR -->
<script>   
let contador = 147;

setInterval(() => {
  contador += Math.floor(Math.random() * 3); // suma random
  document.getElementById("contadorUsuarios").innerText = contador;
}, 3000);
</script> 


<!-- SECCIONES DE CUPOS -->
<script>   
let cupos = 3;

setInterval(() => {
  if(cupos > 1){
    cupos--;
    document.getElementById("cupos").innerText = cupos;
  }
}, 10000); // baja cada 10 seg  
</script> 


<!-- SECCIONES DE WHATS -->  
<script>
function enviarWhats(){
  let nombre = document.getElementById("nombreLead").value;
  if(!nombre){
    alert("Pon tu nombre bro 🔥");
    return;
  }
  let mensaje = `Hola, soy ${nombre}. Quiero mi dieta personalizada`;
  let url = `https://wa.me/5217341771575?text=${encodeURIComponent(mensaje)}`;
  window.open(url, "_blank");
}
</script>


<!-- SECCIONES DE NAVBAR CELULAR RESPONSIVE -->  
<script>
function toggleMenu(){
  const nav = document.getElementById("navLinks");
  nav.classList.toggle("active");
}
</script>
<script>
document.querySelectorAll("#navLinks a").forEach(link => {
  link.addEventListener("click", () => {
    document.getElementById("navLinks").classList.remove("active");
  });
});
</script>
  
  
</body>
</html>
