<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Solo para generar dietas personalizadas</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
<input type="number" id="edad" placeholder="Edad">

<!-- OBJETIVO -->
<label>🎯 Objetivo</label>  
<select id="objetivo">
  <option value="definicion">Definición</option>
  <option value="volumen">Volumen</option>
</select>

<!-- TIPO DE DIETA -->
  <label>⚡ Tipo de dieta</label>
<select id="tipoDieta">
  <option value="normal">Dieta normal</option>
  <option value="keto">Keto</option>
  <option value="godin">Godín</option>
  <option value="runner">Runner</option>
</select>
<button onclick="usarPro()">🔥 Generar dieta PRO</button>
<div id="resultadoPRO"></div>
<button onclick="descargarPDF()" style="margin-top:15px;">
📄 Descargar PDF
</button>
</div>
</section>

  
<!-- BOTTON WHATS  -->  
<div class="whats-box">
  <h3>🔥 ¿Listo para tu plan personalizado?</h3>
  <p>Recibe tu dieta + seguimiento directo conmigo</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Obtener dieta por WhatsApp
  </button>
<span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>

  


<!------ SECCION DE JS  SCRIPTS ------>

<!-- USARPRO -->  
<script>
function usarPro(){
 let datos = {
  peso: parseFloat(document.getElementById("peso").value),
  altura: parseFloat(document.getElementById("altura").value),
  edad: parseFloat(document.getElementById("edad").value),
  objetivo: document.getElementById("objetivo").value,
  tipo: document.getElementById("tipoDieta").value
};

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

function redondear5(x){
  return Math.round(x/5)*5;
}



function generarDietaPRO(datos){
  let {peso, altura, edad, objetivo, tipo} = datos;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + 5;
  let calorias = Math.round(bmr * 1.55);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  // 🔥 MACROS SEGÚN TIPO
  let proteina, grasa, carbos;

  if(tipo === "keto"){
    proteina = Math.round(peso * 2);
    grasa = Math.round((calorias * 0.65) / 9);
    carbos = Math.round((calorias * 0.10) / 4);
  }
  else if(tipo === "runner"){
    proteina = Math.round(peso * 1.8);
    grasa = Math.round((calorias * 0.20) / 9);
    carbos = Math.round((calorias * 0.60) / 4);
  }
  else if(tipo === "godin"){
    proteina = Math.round(peso * 2);
    grasa = Math.round((calorias * 0.25) / 9);
    carbos = Math.round((calorias * 0.40) / 4);
  }
  else{
    proteina = Math.round(peso * 2);
    grasa = Math.round((calorias * 0.25) / 9);
    carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);
  }

  let protePorComida = Math.round(proteina / 4);
  let carbosPorComida = Math.round(carbos / 4);
  let grasaPorComida = Math.round(grasa / 4);

  // 🔥 NOMBRES PRO
  const nombresComida = ["Desayuno", "Comida", "Pre-entreno", "Cena"];

  // 🔥 BASE SEGÚN TIPO
  let proteinas, carbosLista, grasasLista;

  if(tipo === "keto"){
    proteinas = [
      {nombre:"carne", prote:26},
      {nombre:"pollo", prote:31},
      {nombre:"huevo", prote:6}
    ];

    carbosLista = [
      {nombre:"verduras", carbos:5},
      {nombre:"espinaca", carbos:4}
    ];

    grasasLista = [
      {nombre:"aguacate", grasa:15},
      {nombre:"aceite de oliva", grasa:10},
      {nombre:"nueces", grasa:14}
    ];
  }

  else if(tipo === "godin"){
    proteinas = [
      {nombre:"pollo", prote:31},
      {nombre:"atún", prote:25},
      {nombre:"jamón", prote:18}
    ];

    carbosLista = [
      {nombre:"tortillas", carbos:15},
      {nombre:"pan", carbos:12},
      {nombre:"arroz", carbos:28}
    ];

    grasasLista = [
      {nombre:"aguacate", grasa:15},
      {nombre:"nueces", grasa:14}
    ];
  }

  else if(tipo === "runner"){
    proteinas = [
      {nombre:"pollo", prote:31},
      {nombre:"huevo", prote:6}
    ];

    carbosLista = [
      {nombre:"arroz", carbos:28},
      {nombre:"avena", carbos:60},
      {nombre:"pasta", carbos:30},
      {nombre:"plátano", carbos:23}
    ];

    grasasLista = [
      {nombre:"aceite de oliva", grasa:10},
      {nombre:"aguacate", grasa:15}
    ];
  }

  else{
    proteinas = [
      {nombre:"pollo", prote:31},
      {nombre:"carne", prote:26},
      {nombre:"atún", prote:25},
      {nombre:"huevo", prote:6},
      {nombre:"claras", prote:3.5}
    ];

    carbosLista = [
      {nombre:"arroz", carbos:28},
      {nombre:"avena", carbos:60},
      {nombre:"papa", carbos:20},
      {nombre:"tortillas", carbos:15},
      {nombre:"pan", carbos:12}
    ];

    grasasLista = [
      {nombre:"aguacate", grasa:15},
      {nombre:"aceite de oliva", grasa:10},
      {nombre:"nueces", grasa:14}
    ];
  }

  function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  function proteMix(gramos){
    let claras = Math.round(gramos * 0.6 / 3.5);
    let huevos = Math.round(gramos * 0.4 / 6);
    return `${claras} claras + ${huevos} huevo(s)`;
  }

  function calcularProte(p, gramos){
    if(p.nombre === "huevo" || p.nombre === "claras"){
      return proteMix(gramos);
    } else {
      let g = Math.round((gramos / p.prote) * 100);
      return `${g}g ${p.nombre}`;
    }
  }

  function calcularCarbos(c, gramos){
    if(c.nombre === "tortillas"){
      let piezas = Math.round(gramos / c.carbos);
      return `${piezas} tortillas`;
    }
    if(c.nombre === "pan"){
      let piezas = Math.round(gramos / c.carbos);
      return `${piezas} rebanadas de pan`;
    }
    if(c.nombre === "arroz"){
      return `1 taza de arroz`;
    }
    if(c.nombre === "avena"){
      return `1 taza de avena`;
    }
    if(c.nombre === "plátano"){
      return `1 plátano`;
    }
    let g = Math.round((gramos / c.carbos) * 100);
    return `${g}g ${c.nombre}`;
  }

  function calcularGrasa(g, gramos){
    if(g.nombre === "aceite de oliva"){
      let cucharadas = Math.round(gramos / g.grasa);
      return `${cucharadas} cucharada de aceite de oliva`;
    }
    let gReal = Math.round((gramos / g.grasa) * 100);
    return `${gReal}g ${g.nombre}`;
  }

  let comidas = [];

  for(let i=0;i<4;i++){
    let p = random(proteinas);
    let c = random(carbosLista);
    let g = random(grasasLista);

    comidas.push({
      nombre: nombresComida[i],
      proteina: calcularProte(p, protePorComida),
      carbos: calcularCarbos(c, carbosPorComida),
      grasa: calcularGrasa(g, grasaPorComida)
    });
  }

  return { calorias, proteina, carbos, grasa, comidas };
}

  

function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `
  <div class="dieta-card">
    
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional Personalizado</p>
      <p style="font-size:12px;">Sistema inteligente de nutrición</p>
    </div>

    <div style="text-align:center; margin-bottom:25px;">
      <h2>${nombre || "Cliente"}</h2>
      <p>📅 ${fecha}</p>
    </div>

    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
      <p>
        🔥 ${dieta.calorias} kcal<br>
        🥩 ${dieta.proteina}g proteína<br>
        🍚 ${dieta.carbos}g carbohidratos<br>
        🥑 ${dieta.grasa}g grasas
      </p>
    </div>
  `;

  dieta.comidas.forEach((c,i)=>{
  html += `
    <div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>
      </ul>
    </div>
  `;
});

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}


async function descargarPDF(){
  const { jsPDF } = window.jspdf;

  const nombre = document.getElementById("nombreCliente").value || "cliente";
  const elemento = document.getElementById("resultadoPRO");

  if(!elemento.innerText.trim()){
    alert("Primero genera la dieta bro 🔥");
    return;
  }

  // 🔥 CLON
  let copia = elemento.cloneNode(true);

  copia.style.background = "#ffffff";
  copia.style.color = "#111";
  copia.style.padding = "30px";
  copia.style.width = "700px";
  copia.style.fontFamily = "Arial, sans-serif";

  // 🔥 LIMPIAR ICONOS Y FONDOS NEGROS
  copia.querySelectorAll("*").forEach(el=>{
    el.innerHTML = el.innerHTML
      .replace(/🔥/g,"")
      .replace(/🥩/g,"")
      .replace(/🍚/g,"")
      .replace(/🥑/g,"")
      .replace(/📅/g,"");

    el.style.color = "#111";

    // ❌ eliminar fondos negros
    if(el.style.background === "rgb(17, 17, 17)" || el.style.background === "#111"){
      el.style.background = "#f5f5f5";
      el.style.padding = "10px";
      el.style.borderRadius = "8px";
    }
  });

  // 🔥 AGREGAR TITULO A LA PRIMERA CARD (RESUMEN)
  let resumen = copia.querySelector("div[style*='background']");
  if(resumen){
    resumen.innerHTML = `
      <h3 style="margin-bottom:10px; color:#000;">
        Resumen nutricional diario
      </h3>
      ${resumen.innerHTML}
    `;
  }

  // 🔥 HEADER PRO
  let header = document.createElement("div");
  header.innerHTML = `
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
      
      <img src="https://i.imgur.com/4NZ6uLY.png" style="height:45px;">

      <div style="text-align:right;">
        <h2 style="margin:0;">Charly Fitness</h2>
        <p style="margin:0; font-size:11px;">Nutrición & Transformación Física</p>
      </div>

    </div>

    <hr style="border:none; border-top:2px solid #d4af37; margin-bottom:15px;">
  `;

  copia.prepend(header);

  // 🔥 FOOTER
  let footer = document.createElement("div");
  footer.innerHTML = `
    <div style="margin-top:20px; font-size:10px; text-align:center; color:#777;">
      Plan personalizado | WhatsApp: 7341771575
    </div>
  `;
  copia.appendChild(footer);

  // 🔥 CONTENEDOR OCULTO
  let contenedor = document.createElement("div");
  contenedor.style.position = "fixed";
  contenedor.style.left = "-9999px";
  contenedor.appendChild(copia);
  document.body.appendChild(contenedor);

  // 🔥 REDUCIR ESCALA PARA QUE TODO QUEPA EN 1 HOJA
  const canvas = await html2canvas(copia, {
    scale: 1.5,
    useCORS: true
  });

  const imgData = canvas.toDataURL("image/jpeg", 1.0);

  const pdf = new jsPDF("p","mm","a4");

  const imgWidth = 210;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  // 🔥 FONDO PREMIUM
  pdf.setFillColor(255,255,255);
  pdf.rect(0,0,210,297,"F");

  pdf.setFillColor(212,175,55);
  pdf.rect(0,0,210,8,"F");

  // 🔥 AJUSTE AUTOMÁTICO A UNA HOJA
  let finalHeight = imgHeight;

  if(imgHeight > 280){
    finalHeight = 280;
  }

  pdf.addImage(imgData,"JPEG",0,10,imgWidth,finalHeight);

  pdf.save(`dieta-${nombre}.pdf`);

  document.body.removeChild(contenedor);
}
  

function enviarWhats(){
  let nombre = document.getElementById("nombreCliente").value || "Cliente";
  let dieta = document.getElementById("resultadoPRO").innerText;

  if(!dieta.trim()){
    alert("Genera la dieta primero bro 🔥");
    return;
  }

  let mensaje = `🔥 DIETA PERSONALIZADA 🔥

Cliente: ${nombre}

${dieta}

💪 Generado por Charly Fitness`;

  let url = `https://wa.me/527341771575?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank");
}


  function guardarCliente(){
  let nombre = document.getElementById("nombreCliente").value;
  let dieta = document.getElementById("resultadoPRO").innerText;

  if(!nombre || !dieta.trim()){
    alert("Falta info bro 🔥");
    return;
  }

  let clientes = JSON.parse(localStorage.getItem("clientes")) || [];

  clientes.push({
    nombre,
    dieta,
    fecha: new Date().toLocaleDateString()
  });

  localStorage.setItem("clientes", JSON.stringify(clientes));

  alert("Cliente guardado 🔥");
}

  
</script>
