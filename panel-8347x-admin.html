<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>
<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- 🔥 IMC -->
  <input type="text" id="imc" placeholder="IMC automático" disabled>

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>

  <button onclick="descargarPDF()">📄 Descargar PDF</button>
</div>
</section>

<div class="whats-box">
  <button onclick="enviarWhats()">📲 Enviar al cliente</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

/* ================= IMC ================= */
function calcularIMC(){
  let peso = parseFloat(document.getElementById("peso").value);
  let altura = parseFloat(document.getElementById("altura").value);

  if(altura > 3) altura = altura / 100;

  if(peso && altura){
    let imc = (peso / (altura*altura)).toFixed(1);
    document.getElementById("imc").value = imc;
  }
}
document.getElementById("peso").addEventListener("input", calcularIMC);
document.getElementById("altura").addEventListener("input", calcularIMC);

/* ================= DIETA PRO ================= */
function generarDietaPRO(datos){

  let {peso, altura, edad, sexo} = datos;

  if(altura > 3) altura = altura / 100;

  let imc = peso / (altura*altura);

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo==="mujer"?-161:5);
  let calorias = Math.round(bmr * 1.5);

  let proteina = Math.round(peso * 2.2);
  let grasa = Math.round((calorias * 0.25)/9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  let comidas = [
    {nombre:"Desayuno", texto:"Proteína + carbos + grasa"},
    {nombre:"Media mañana", texto:"Proteína + carbos"},
    {nombre:"Comida", texto:"Proteína + carbos + verduras"},
    {nombre:"Post-entreno", texto:"Proteína rápida"},
    {nombre:"Cena", texto:"Proteína + verduras"}
  ];

  return {calorias, proteina, carbos, grasa, imc: imc.toFixed(1), comidas};
}

/* ================= MOSTRAR ================= */
function mostrarDieta(d){

  let html = `<div class="dieta-card" contenteditable="true">
  <h2>Plan Nutricional</h2>

  <p>🔥 ${d.calorias} kcal</p>
  <p>🥩 ${d.proteina} g</p>
  <p>🍚 ${d.carbos} g</p>
  <p>🥑 ${d.grasa} g</p>
  <p>📊 IMC: ${d.imc}</p><hr>`;

  d.comidas.forEach(c=>{
    html+=`<p>🍽️ <strong>${c.nombre}:</strong> ${c.texto}</p>`;
  });

  html+=`<p style="text-align:center;margin-top:20px;">💎 Charly Fitness</p></div>`;

  document.getElementById("resultadoPRO").innerHTML=html;
}

/* ================= USAR ================= */
function usarPro(){

  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa datos");
    return;
  }

  mostrarDieta(generarDietaPRO(datos));
}

/* ================= RUTINA ================= */
function generarRutina(){
  document.getElementById("resultadoPRO").innerHTML = `
  <div class="dieta-card">
  <h2>Rutina</h2>
  <p>Día 1: Pecho</p>
  <p>Día 2: Espalda</p>
  <p>Día 3: Pierna</p>
  </div>`;
}

/* ================= PDF ================= */
async function descargarPDF(){
  const { jsPDF } = window.jspdf;
  const canvas = await html2canvas(document.getElementById("resultadoPRO"));
  const img = canvas.toDataURL("image/png");

  const pdf = new jsPDF();
  pdf.addImage(img,"PNG",10,10,180,0);
  pdf.save("plan.pdf");
}

/* ================= WHATS ================= */
function enviarWhats(){
  let texto = document.getElementById("resultadoPRO").innerText;
  let url = "https://wa.me/?text=" + encodeURIComponent(texto);
  window.open(url,"_blank");
}

</script>

</body>
</html>
