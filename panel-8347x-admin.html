<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO (FIX PRINCIPAL) ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){

  let {peso, altura, edad, objetivo, sexo, nivel} = datos;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer" ? -161 : 5);

  let factorActividad = 1.2;
  if(dias >= 2 && dias <= 3) factorActividad = 1.4;
  if(dias >= 4 && dias <= 5) factorActividad = 1.55;
  if(dias >= 6) factorActividad = 1.7;

  let calorias = Math.round(bmr * factorActividad);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteBase = {
    novato: 1.6,
    intermedio: 1.8,
    avanzado: 2,
    competidor: 2.2
  };

  let proteina = Math.round(peso * proteBase[nivel]);

  let grasa = Math.round((calorias * 0.25) / 9);
  let caloriasProte = proteina * 4;
  let caloriasGrasa = grasa * 9;
  let caloriasRestantes = calorias - (caloriasProte + caloriasGrasa);
  let carbos = Math.round(caloriasRestantes / 4);

  let comidas = [];

  /* ================= NOVATO ================= */
  if(nivel === "novato"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"3 claras + 1 huevo entero con 40g jamón",
        carbos:"2 tortillas de maíz",
        grasa:"1/4 de aguacate",
        verdura:"",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"150g pechuga de pollo",
        carbos:"1 taza de arroz",
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza de verduras",
        fruta:""
      },
      {
        nombre:"Cena",
        proteina:"120g atún o pollo",
        carbos:"2 tostadas horneadas",
        grasa:"1/4 de aguacate",
        verdura:"1 taza de verduras",
        fruta:""
      }
    ];
  }

  /* ================= INTERMEDIO ================= */
  else if(nivel === "intermedio"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"4 claras + 1 huevo entero",
        carbos:"1/2 taza de avena",
        grasa:"1 cucharadita aceite de coco",
        verdura:"",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"150g pollo o carne magra",
        carbos:"1 taza de arroz",
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza de verduras",
        fruta:""
      },
      {
        nombre:"Cena",
        proteina:"150g pescado o pollo",
        carbos:"1/2 taza de arroz",
        grasa:"10 almendras",
        verdura:"1 taza de verduras",
        fruta:""
      }
    ];
  }

  /* ================= AVANZADO ================= */
  else if(nivel === "avanzado"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"5 claras + 1 huevo entero",
        carbos:"1 taza de avena",
        grasa:"1 cucharadita aceite de coco",
        verdura:"",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"180g pollo",
        carbos:"1 taza de arroz",
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza de verduras",
        fruta:""
      },
      {
        nombre:"Pre-entreno",
        proteina:"1 scoop proteína whey",
        carbos:"1 plátano",
        grasa:"5 almendras",
        verdura:"",
        fruta:""
      },
      {
        nombre:"Cena",
        proteina:"150g pescado",
        carbos: objetivo === "definicion" ? "1-2 tazas de verduras" : "1/2 taza de arroz",
        grasa:"1 cucharadita aceite de oliva",
        verdura:"1 taza de verduras",
        fruta:""
      }
    ];
  }

  /* ================= COMPETIDOR ================= */
  else {
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"6 claras + 1 huevo entero",
        carbos:"1/2 taza avena",
        grasa:"5 almendras",
        verdura:"",
        fruta:""
      },
      {
        nombre:"Comida",
        proteina:"180g pollo",
        carbos:"1 taza arroz",
        grasa:"1 cucharadita aceite de coco",
        verdura:"1 taza verduras",
        fruta:""
      },
      {
        nombre:"Pre-entreno",
        proteina:"1 scoop proteína whey",
        carbos:"1 plátano",
        grasa:"",
        verdura:"",
        fruta:""
      },
      {
        nombre:"Cena",
        proteina:"180g pescado",
        carbos:"1-2 tazas verduras",
        grasa:"",
        verdura:"ensalada libre",
        fruta:""
      }
    ];
  }

  return { calorias, proteina, carbos, grasa, comidas };
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional Personalizado</p>
    </div>

    <div style="text-align:center; margin-bottom:25px;">
      <h2>${nombre || "Cliente"}</h2>
      <p>📅 ${fecha}</p>
    </div>

    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
      🔥 ${dieta.calorias} kcal<br>
      🥩 ${dieta.proteina}g proteína<br>
      🍚 ${dieta.carbos}g carbohidratos<br>
      🥑 ${dieta.grasa}g grasas
    </div>`;

  dieta.comidas.forEach(c=>{
    html += `<div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>`;
    if(c.verdura) html += `<li>🥦 ${c.verdura}</li>`;
    if(c.fruta) html += `<li>🍎 ${c.fruta}</li>`;
    html += `</ul></div>`;
  });

  /* 🔥 BLOQUE PRO REAL */
  html += `
  <div class="card-meal">
    <h4>📌 Recomendaciones</h4>
    <ul>
      <li>✔ Cocinar con aceite de aguacate o coco</li>
      <li>✔ Tomar 3-4 litros de agua diarios</li>
      <li>✔ Agua de jamaica o limón con stevia</li>
      <li>✔ Evitar azúcar y ultraprocesados</li>
    </ul>
  </div>

  <div class="card-meal">
    <h4>🍽️ Si tienes hambre</h4>
    <ul>
      <li>✔ Pepino o jícama al gusto</li>
      <li>✔ Verduras libres</li>
      <li>✔ Gelatina light (1-2)</li>
    </ul>
  </div>

  <div class="card-meal">
    <h4>⚠️ Notas</h4>
    <ul>
      <li>✔ Constancia = resultados</li>
      <li>✔ Ajustar cada 2-4 semanas</li>
      <li>✔ Dormir 7-8 horas</li>
    </ul>
  </div>
  `;

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}
</script>



<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
