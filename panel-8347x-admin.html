<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>
<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
    <option value="vegano">Vegano</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>⚡ Tipo de dieta</label>
  <select id="tipoDieta">
    <option value="normal">Normal</option>
    <option value="keto">Keto</option>
    <option value="godin">Godín</option>
    <option value="runner">Runner</option>
  </select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta + Rutina</button>
  <button onclick="enviarWhats()" style="margin-top:10px;">📲 Enviar al cliente por WhatsApp</button>

  <div id="resultadoPRO"></div>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>

<script>
/* ===================== DIETA PRO ===================== */
function usarPro(){
  let datos = {
    nombre: document.getElementById("nombreCliente").value || "Cliente",
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    tipo: document.getElementById("tipoDieta").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  let rutina = generarRutina(datos);
  mostrarResultados(dieta, rutina);
}

/* ===================== GENERAR DIETA ===================== */
function generarDietaPRO(datos){
  let {peso, altura, edad, objetivo, tipo, sexo} = datos;

  if(altura>3) altura/=100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + 5;
  let calorias = Math.round(bmr*1.55);
  if(objetivo==="definicion") calorias-=400;
  if(objetivo==="volumen") calorias+=300;

  let proteina = Math.round(peso*2);
  let grasa = Math.round(calorias*0.25/9);
  let carbos = Math.round((calorias-(proteina*4+grasa*9))/4);

  let comidasNombres = ["Desayuno","Comida","Pre-entreno","Cena"];

  // 🔥 ALIMENTOS VARIADOS
  let proteinas = sexo==="vegano" ? ["tofu","tempeh","legumbres","whey vegano"] : ["pollo","res magra","pescado","huevo"];
  let carbosOpc = ["arroz","papa","plátano macho","avena","pasta","tortillas","galletas de arroz"];
  let verdurasOpc = ["espinaca","jitomate","lechuga","calabaza","camote"];
  let frutasVerdes = ["manzana verde","toronja","kiwi"];
  let frutasRojas = ["manzana roja","fresa","papaya","melon"];

  let comidas=[];
  for(let i=0;i<4;i++){
    // Proteína 200g aprox (ajustado)
    let prot = proteinas[Math.floor(Math.random()*proteinas.length)];
    let gramosProt = Math.round(proteina/4*50/30); // ajustado 30g proteína aprox cada 100g
    let proteinaTexto = `${gramosProt*100}g ${prot}`;

    // Carbohidratos
    let carb = carbosOpc[Math.floor(Math.random()*carbosOpc.length)];
    let gramosCarb = Math.round(carbos/4);
    let carbTexto = "";
    switch(carb){
      case "arroz": carbTexto="1 taza de arroz"; break;
      case "pasta": carbTexto="1 taza de pasta"; break;
      case "papa": carbTexto="1 taza de puré de papa"; break;
      case "plátano macho": carbTexto="1 plátano macho"; break;
      case "tortillas": carbTexto=Math.round(gramosCarb/15)+" tortillas"; break;
      case "galletas de arroz": carbTexto=Math.round(gramosCarb/5)+" galletas de arroz"; break;
      case "avena": carbTexto="1 taza de avena"; break;
      default: carbTexto=gramosCarb+"g "+carb;
    }

    // Verduras
    let verd = verdurasOpc[Math.floor(Math.random()*verdurasOpc.length)];
    let verdTexto = "1 taza "+verd;

    // Fruta
    let fruta = objetivo==="definicion" ? frutasVerdes[Math.floor(Math.random()*frutasVerdes.length)]
                                         : frutasRojas[Math.floor(Math.random()*frutasRojas.length)];

    comidas.push({
      nombre: comidasNombres[i],
      proteina: proteinaTexto,
      carbos: carbTexto,
      verdura: verdTexto,
      fruta: fruta,
      grasa: "10g aceite oliva/aguacate/nueces"
    });
  }

  return {calorias, proteina, carbos, grasa, comidas};
}

/* ===================== GENERAR RUTINA ===================== */
function generarRutina(datos){
  let {sexo, dias} = datos;
  dias = parseInt(document.getElementById("diasGym").value) || 3;

  let ejerciciosHombre = {
    Pecho:["Press banca 4x10","Aperturas mancuernas 3x12","Fondos 3x15"],
    Espalda:["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    Hombros:["Press militar 4x10","Elevaciones laterales 3x12","Facepull 3x15"],
    Bíceps:["Curl barra 4x12","Curl martillo 3x12"],
    Tríceps:["Press francés 4x12","Fondos 3x15"],
    Pierna:["Sentadillas 4x10","Prensa 3x12","Curl femoral 3x12","Gemelos 4x15"]
  };
  let ejerciciosMujer = {
    Pierna:["Sentadillas 4x12","Hip thrust 4x12","Prensa 3x15","Gemelos 3x20"],
    Glúteo:["Patada glúteo 3x15","Abducción 3x20"],
    Core:["Plancha 3x60s","Crunch 3x20","Russian twist 3x20"],
    Espalda:["Remo mancuerna 4x12","Jalón polea 3x12"],
    Hombros:["Elevaciones laterales 3x12","Press militar 3x10"],
    Brazos:["Curl bíceps 3x12","Extensión tríceps 3x12"]
  };
  let pool = (sexo==="hombre")? ejerciciosHombre : ejerciciosMujer;
  let grupos = Object.keys(pool);

  let rutina=[];
  for(let i=0;i<dias;i++){
    let diaNombre=`Día ${i+1}`;
    let bloques=[];
    for(let j=0;j<3;j++){
      let idx=(i+j)%grupos.length;
      bloques.push({grupo: grupos[idx], ejercicios: pool[grupos[idx]]});
    }
    rutina.push({dia:diaNombre,bloques});
  }
  return rutina;
}

/* ===================== MOSTRAR RESULTADOS ===================== */
function mostrarResultados(dieta,rutina){
  let html=`<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional + Rutina Personalizado</p>
    </div>`;

  // Dieta
  dieta.comidas.forEach(c=>{
    html+=`<div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥬 ${c.verdura}</li>
        <li>🍎 ${c.fruta}</li>
        <li>🥑 ${c.grasa}</li>
      </ul>
    </div>`;
  });

  // Rutina
  rutina.forEach(d=>{
    html+=`<div class="card-meal no-break">
      <h4>🏋️ ${d.dia}</h4>`;
    d.bloques.forEach(b=>{
      html+=`<strong>${b.grupo}</strong><ul>`;
      b.ejercicios.forEach(e=>{
        html+=`<li>${e}</li>`;
      });
      html+=`</ul>`;
    });
    html+=`</div>`;
  });

  document.getElementById("resultadoPRO").innerHTML=html;
}

/* ===================== DESCARGAR PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento=document.getElementById("resultadoPRO");
  if(!elemento.innerText.trim()){ alert("Primero genera la " + tipo + " bro 🔥"); return; }
  let nombre=document.getElementById("nombreCliente").value || "Cliente";
  let canvas=await html2canvas(elemento,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
  let imgData=canvas.toDataURL("image/jpeg",1.0);
  let pdf=new jsPDF("p","mm","a4");
  const imgWidth=210;
  const imgHeight=(canvas.height*imgWidth)/canvas.width;
  pdf.addImage(imgData,"JPEG",0,10,imgWidth,imgHeight>280?280:imgHeight);
  pdf.save(`${tipo}-${nombre}.pdf`);
}

/* ===================== WHATSAPP ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let mensaje=`🔥 Hola ${nombre}, gracias por tu compra. Aquí están tus planes:\n- Dieta PDF\n- Rutina PDF\n\nDescárgalos desde el enlace y disfruta tu entrenamiento!`;
  let numero=prompt("Ingresa el número de WhatsApp del cliente (ej: 5273xxxxxxx):");
  if(!numero){ alert("Debes ingresar un número"); return; }
  let url=`https://wa.me/${numero}?text=${encodeURIComponent(mensaje)}`;
  window.open(url,"_blank");
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
