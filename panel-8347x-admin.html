<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){

  let {peso, altura, edad, objetivo, sexo, nivel} = datos;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer" ? -161 : 5);

  let factorActividad = 1.2;
  if(dias >= 2 && dias <= 3) factorActividad = 1.4;
  if(dias >= 4 && dias <= 5) factorActividad = 1.55;
  if(dias >= 6) factorActividad = 1.7;

  let calorias = Math.round(bmr * factorActividad);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteBase = {
    novato: 1.6,
    intermedio: 1.8,
    avanzado: 2,
    competidor: 2.2
  };

  let proteina = Math.round(peso * proteBase[nivel]);

  let grasa = Math.round((calorias * 0.25) / 9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  let carbosNoche = objetivo === "definicion" ? "1-2 tazas de verduras" : "1/2 taza de arroz";
  let porcionArroz = sexo === "mujer" ? "3/4 taza de arroz" : "1 taza de arroz";
  let porcionAvena = sexo === "mujer" ? "1/2 taza de avena" : "1 taza de avena";

  let comidas = [];

  if(nivel === "novato"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"3 claras + 1 huevo entero con jamón",
        carbos:"2 tortillas de maíz",
        grasa:"1/4 de aguacate",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"150g pechuga de pollo",
        carbos:porcionArroz,
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza de verduras"
      },
      {
        nombre:"Cena",
        proteina:"120g atún o pollo",
        carbos:carbosNoche,
        grasa:"1/4 de aguacate",
        verdura:"1 taza de verduras"
      }
    ];
  }

  else if(nivel === "intermedio"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"4 claras + 1 huevo",
        carbos:porcionAvena,
        grasa:"1 cucharadita aceite de coco",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"150g carne o pollo",
        carbos:porcionArroz,
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza verduras"
      },
      {
        nombre:"Cena",
        proteina:"150g pescado",
        carbos:carbosNoche,
        grasa:"10 almendras",
        verdura:"1 taza verduras"
      }
    ];
  }

  else if(nivel === "avanzado"){
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"5 claras + 1 huevo",
        carbos:porcionAvena,
        grasa:"1 cucharadita aceite de coco",
        fruta:"1 fruta"
      },
      {
        nombre:"Comida",
        proteina:"180g pollo",
        carbos:porcionArroz,
        grasa:"1 cucharadita aceite de aguacate",
        verdura:"1 taza verduras"
      },
      {
        nombre:"Pre-entreno",
        proteina:"1 scoop whey",
        carbos:"1 plátano",
        grasa:"5 almendras"
      },
      {
        nombre:"Cena",
        proteina:"150g pescado",
        carbos:carbosNoche,
        grasa:"1 cucharadita aceite de oliva",
        verdura:"1 taza verduras"
      }
    ];
  }

  else {
    comidas = [
      {
        nombre:"Desayuno",
        proteina:"6 claras + 1 huevo",
        carbos: objetivo === "definicion" ? "1/2 taza avena" : porcionAvena,
        grasa:"5 almendras"
      },
      {
        nombre:"Comida",
        proteina:"180g pollo",
        carbos:porcionArroz,
        grasa:"1 cucharadita aceite de coco",
        verdura:"1 taza verduras"
      },
      {
        nombre:"Pre-entreno",
        proteina:"1 scoop whey",
        carbos:"1 plátano"
      },
      {
        nombre:"Cena",
        proteina:"180g pescado",
        carbos:carbosNoche,
        verdura:"ensalada libre"
      }
    ];
  }

  return { calorias, proteina, carbos, grasa, comidas };
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;

  let html = `<div class="dieta-card">`;

  html += `<h2>${nombre || "Cliente"}</h2>`;
  html += `🔥 ${dieta.calorias} kcal<br>`;
  html += `🥩 ${dieta.proteina}g proteína<br>`;
  html += `🍚 ${dieta.carbos}g carbs<br>`;
  html += `🥑 ${dieta.grasa}g grasas`;

  dieta.comidas.forEach(c=>{
    html += `<h4>🍽️ ${c.nombre}</h4><ul>`;
    html += `<li>🥩 ${c.proteina}</li>`;
    if(c.carbos) html += `<li>🍚 ${c.carbos}</li>`;
    if(c.grasa) html += `<li>🥑 ${c.grasa}</li>`;
    if(c.verdura) html += `<li>🥦 ${c.verdura}</li>`;
    if(c.fruta) html += `<li>🍎 ${c.fruta}</li>`;
    html += `</ul>`;
  });

  html += `
  <h4>📌 Recomendaciones</h4>
  <ul>
  <li>✔ Cocinar con aceite de aguacate o coco</li>
  <li>✔ 3-4L de agua</li>
  <li>✔ Agua de jamaica o limón con stevia</li>
  </ul>

  <h4>🍽️ Hambre</h4>
  <ul>
  <li>✔ Pepino o jícama libre</li>
  <li>✔ Gelatina light</li>
  </ul>
  `;

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== RUTINA (ARREGLADA) ===================== */
function generarRutina(){

  let nivel = document.getElementById("nivel").value;

  let rutina = {
    novato: ["Full Body","Full Body","Full Body"],
    intermedio: ["Pecho","Espalda","Pierna","Hombro"],
    avanzado: ["Push","Pull","Pierna","Hombro","Pierna"],
    competidor: ["Push","Pull","Pierna","Hombro","Pierna","Full Body"]
  };

  let html = `<div class="dieta-card"><h3>🏋️ Rutina</h3>`;

  rutina[nivel].forEach((dia,i)=>{
    html += `<p>🔥 Día ${i+1}: ${dia}</p>`;
  });

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== PDF (REGRESA) ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  let canvas = await html2canvas(elemento);
  let img = canvas.toDataURL("image/png");

  let pdf = new jsPDF();
  pdf.addImage(img, 'PNG', 0, 0, 210, 297);
  pdf.save(tipo+".pdf");
}

/* ===================== WHATS ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numero=prompt("Número cliente","52");

  let msg=`Hola ${nombre} 🔥 Aquí tienes tu plan 💪`;

  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
