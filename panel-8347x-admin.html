<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>
<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF()" style="margin-top:15px;">📄 Descargar PDF</button>
</div>
</section>

<script>

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){
  let {peso, altura, edad, objetivo, sexo, nivel} = datos;

  if(altura > 3) altura = altura / 100;

  // 🔥 ESTIMACIÓN INTELIGENTE
  let imc = peso / (altura * altura);

  let masaMagraFactor = 1;

  if(nivel === "competidor") masaMagraFactor = 1.15;
  else if(nivel === "avanzado") masaMagraFactor = 1.1;
  else if(nivel === "intermedio") masaMagraFactor = 1.05;

  let pesoMagroEstimado = peso * (1 / (imc/22)) * masaMagraFactor;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo==="mujer"?-161:5);
  let calorias = Math.round(bmr * 1.5);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteina = Math.round(pesoMagroEstimado * 2.2);
  let grasa = Math.round((calorias * 0.25)/9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  return {calorias, proteina, carbos, grasa};
}

/* ===================== MENSAJE COACH ===================== */
function generarMensajeCoach(datos){
  if(datos.objetivo==="definicion"){
    return "Este plan está diseñado para quemar grasa manteniendo masa muscular.";
  }
  return "Este plan está diseñado para aumentar masa muscular de forma limpia.";
}

/* ===================== MOSTRAR ===================== */
function mostrarDieta(dieta, datos){
  let nombre = datos.nombre || "Cliente";
  let fecha = new Date().toLocaleDateString();
  let mensaje = generarMensajeCoach(datos);

  let html = `
  <div class="dieta-card">

  <h2>${nombre}</h2>
  <p>${fecha}</p>

  <div style="background:#111;color:#fff;padding:20px;border-radius:12px;border:1px solid gold;">

    <h3 style="color:#d4af37;">💎 Plan nutricional diario</h3>

    <p>${mensaje}</p>

    <ul style="list-style:none;padding:0;line-height:2;">
      <li>🔥 <strong>${dieta.calorias} kcal</strong></li>
      <li>🥩 ${dieta.proteina} g proteína</li>
      <li>🍚 ${dieta.carbos} g carbos</li>
      <li>🥑 ${dieta.grasa} g grasa</li>
    </ul>

  </div>

  <p style="text-align:center;margin-top:20px;font-weight:bold;">
  💎 Plan personalizado por Charly Fitness
  </p>

  </div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== USAR ===================== */
function usarPro(){
  let datos = {
    nombre: document.getElementById("nombreCliente").value,
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta, datos);
}

/* ===================== PDF ===================== */
async function descargarPDF(){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  const pdf = new jsPDF();

  const canvas = await html2canvas(elemento, {scale:2});
  const imgData = canvas.toDataURL("image/jpeg");

  pdf.addImage(imgData, "JPEG", 10, 10, 190, 0);
  pdf.save("plan.pdf");
}

</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
