<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO ===================== */

/* ===================== USAR PRO ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
/* ===================== DIETA PRO HUMANIZADA ===================== */
function generarDietaPRO(datos){
  let {peso, altura, edad, objetivo, sexo, nivel} = datos;

  if(altura > 3) altura = altura / 100;

  // 🔥 Calorías
  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer"? -161: 5);
  let factorActividad = 1.55; // base
  let calorias = Math.round(bmr * factorActividad);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  // 🔥 Proteínas
  const proteBase = { novato:1.6, intermedio:1.8, avanzado:2, competidor:2.2 };
  let proteina = Math.round(peso * proteBase[nivel]);

  // 🔥 Listas de alimentos más humanas
  const proteinas = [
    "4 claras + 1 huevo entero con espinaca",
    "150g pollo",
    "180g pescado",
    "150g carne magra",
    "1 scoop proteína whey"
  ];
  const carbos = [
    "½ taza arroz",
    "½ taza avena",
    "2 tortillas de maíz",
    "1 pan árabe",
    "1 camote mediano",
    "1 plátano macho",
    "3 hot cakes (volumen)"
  ];
  const grasas = [
    "1 cucharadita aceite de coco",
    "1 cucharadita aceite de oliva",
    "¼ aguacate",
    "10 almendras",
    "10 nueces",
    "1 cucharada mantequilla de maní",
    "2 cucharadas amaranto"
  ];
  const verduras = [
    "1 plato lechuga",
    "1 taza calabaza cocida",
    "1 taza brócoli cocido",
    "1 taza espinaca salteada"
  ];
  const frutasDef = ["Papaya","Melón","Toronja","Manzana verde"];
  const frutasVol = ["Plátano","Manzana roja","Fresas","Mango"];

  function random(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  // 🔥 Número de comidas según objetivo
  let numComidas;
  if(objetivo==="definicion"){
    numComidas = 4; // + 1 post-entreno proteína
  } else {
    numComidas = 6; // Volumen avanzado
  }

  let comidas = [];

  for(let i=0; i<numComidas; i++){
    let comida = {};

    // Última comida post-entreno
    if(objetivo==="volumen" && i === numComidas-1){
      comida = {
        nombre:"Post-entreno",
        proteina:"1 scoop proteína whey",
        carbos:"1 pan árabe o 1 plátano macho",
        grasa:"1 cucharadita mantequilla de maní",
        verdura:"",
        fruta:""
      };
    } else if(objetivo==="definicion" && i === numComidas-1){
      comida = {
        nombre:"Post-entreno",
        proteina:"1 scoop proteína whey",
        carbos:"½ taza arroz",
        grasa:"5 almendras",
        verdura:"",
        fruta:""
      };
    } else {
      comida = {
        nombre: `Comida ${i+1}`,
        proteina: random(proteinas),
        carbos: random(carbos),
        grasa: random(grasas),
        verdura: random(verduras),
        fruta: objetivo==="definicion"? random(frutasDef) : random(frutasVol)
      };
    }

    comidas.push(comida);
  }

  return {
    calorias,
    proteina,
    carbos: Math.round(calorias/4),
    grasa: Math.round(calorias*0.25/9),
    comidas
  };
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();
  let html = `<div class="dieta-card">
  <h2>${nombre||"Cliente"}</h2>
  <p>${fecha}</p>
  🔥 ${dieta.calorias} kcal<br>
  🥩 ${dieta.proteina}g proteína<br>
  🍚 ${dieta.carbos}g carbs<br>
  🥑 ${dieta.grasa}g grasas`;

  dieta.comidas.forEach(c=>{
    html+=`<div class="card-meal">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>
        ${c.verdura?`<li>🥦 ${c.verdura}</li>`:""}
        ${c.fruta?`<li>🍎 ${c.fruta}</li>`:""}
      </ul>
    </div>`;
  });

  html+=`<div class="card-meal">
    <h4>📌 Recomendaciones</h4>
    ✔ Cocinar con aceite de aguacate o coco<br>
    ✔ 3-4L agua diarios<br>
    ✔ Jamaica o limón con stevia<br>
    ✔ Evitar ultraprocesados
  </div>
  <div class="card-meal">
    <h4>🍽️ Hambre</h4>
    ✔ Pepino/jícama libre<br>
    ✔ Verduras libres<br>
    ✔ Gelatina light
  </div>
  </div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== DESCARGAR PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");
  if(!elemento.innerText.trim()){
    alert("Primero genera algo bro 🔥");
    return;
  }
  let canvas = await html2canvas(elemento,{scale:2});
  let img = canvas.toDataURL("image/jpeg",1.0);
  let pdf = new jsPDF("p","mm","a4");
  let width = 210;
  let height = canvas.height * width / canvas.width;
  let y=10;
  while(height>0){
    pdf.addImage(img,"JPEG",0,y,width,height);
    height-=280;
    if(height>0){ pdf.addPage(); y=0; }
  }
  pdf.save(tipo+".pdf");
}

/* ===================== WHATSAPP ===================== */
function enviarWhats(){
  let nombre = document.getElementById("nombreCliente").value;
  let numero = prompt("Número cliente","52");
  if(!numero) return;
  let msg = `Hola ${nombre} 🔥 aquí tienes tu plan`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* ===================== RUTINA ===================== */
function generarRutina(){
  let sexo = document.getElementById("sexo").value;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  function getSplit(){
    if(sexo==="mujer"){
      if(dias<=3) return ["Pierna + glúteo","Tren superior","Pierna"];
      if(dias===4) return ["Glúteo","Espalda","Pierna","Glúteo + abdomen"];
      return ["Glúteo","Pierna","Espalda","Pierna","Glúteo"];
    } else {
      if(dias<=3) return ["Push","Pull","Pierna"];
      if(dias===4) return ["Pecho","Espalda","Pierna","Hombro + brazos"];
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
  }

  const ejercicios = {
    "Pecho":["Press banca 4x10","Aperturas 3x12","Fondos 3x12"],
    "Espalda":["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    "Pierna":["Sentadilla 4x10","Prensa 3x12","Femoral 3x12","Pantorrilla 4x15"],
    "Hombro":["Press militar 4x10","Elevaciones laterales 3x12","Pájaros 3x12"],
    "Bíceps":["Curl barra 3x12","Curl martillo 3x12"],
    "Tríceps":["Fondos 3x12","Extensión polea 3x12"],
    "Glúteo":["Hip thrust 4x12","Patada glúteo 3x15","Puente glúteo 3x15"],
    "Abdomen":["Plancha 3x60s","Crunch 3x15","Elevación piernas 3x12"]
  };

  const splitMap = {
    "Push":["Pecho","Hombro","Tríceps"],
    "Pull":["Espalda","Bíceps"],
    "Hombro + brazos":["Hombro","Bíceps","Tríceps"],
    "Tren superior":["Pecho","Espalda","Hombro","Bíceps","Tríceps"],
    "Glúteo + abdomen":["Glúteo","Abdomen"]
  };

  let split = getSplit();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;

  split.forEach((dia,i)=>{
    html += `<div class="card-meal">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;
    let grupos = splitMap[dia] || [dia];
    grupos.forEach(g=>{
      let lista = ejercicios[g] || ["Ejercicio base 3x12"];
      html += `<strong>${g}</strong><ul>`;
      lista.forEach(e=>{
        html += `<li>${e}</li>`;
      });
      html += `</ul>`;
    });
    html += `<p>🔥 Cardio: ${sexo==="mujer"? "20-30 min":"20-35 min"}</p>
             <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}
</script>



  

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
