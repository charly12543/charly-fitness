<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>
<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>

<script>
/* ===================== USAR PRO ===================== */
function usarPro(){
  let datos = {
    nombre: document.getElementById("nombreCliente").value,
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value,
    tomaWhey: document.getElementById("tomaWhey").value==="true"
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){
  let {nombre, peso, altura, edad, objetivo, sexo, nivel, tomaWhey} = datos;

  if(altura > 3) altura = altura / 100;

  // 🔥 DETECCIÓN
  let esNino = edad < 14;
  let imc = peso / (altura * altura);
  let tipoFisico = "fit";

  if(imc >= 35) tipoFisico = "obesidad_severa";
  else if(imc >= 30) tipoFisico = "obesidad";
  else if(imc >= 25) tipoFisico = "sobrepeso";

  // 🔥 CALORÍAS
  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo==="mujer"?-161:5);
  let calorias = Math.round(bmr * 1.5);

  if(tipoFisico==="obesidad_severa") calorias -= 900;
  else if(tipoFisico==="obesidad") calorias -= 700;
  else if(tipoFisico==="sobrepeso") calorias -= 400;
  else if(objetivo==="volumen") calorias += 300;

  // 🔥 PROTEÍNA AJUSTADA
  let proteFactor = 2.2;
  if(sexo==="mujer") proteFactor = 1.8;
  if(esNino) proteFactor = 1.2;

  let proteina = Math.round(peso * proteFactor);
  let grasa = Math.round((calorias * 0.25)/9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  let comidas = [];
  let protePorComida = Math.round(proteina / 5);

  function proteFuente(){
    return protePorComida + "g pollo / carne / pescado (≈ tamaño palma = 100–120g)";
  }

  // 🔥 CARBOS CON INTERCAMBIOS
  function carb(tipo){
    let base = "";

    if(tipoFisico==="obesidad" || tipoFisico==="obesidad_severa"){
      if(tipo==="alto") base = "½ taza arroz (≈100g)";
      else if(tipo==="medio") base = "¼ taza arroz (≈50g)";
      else base = "solo verduras";
    }
    else if(tipoFisico==="sobrepeso"){
      if(tipo==="alto") base = "¾ taza arroz (≈150g)";
      else if(tipo==="medio") base = "½ taza arroz (≈100g)";
      else base = "¼ taza arroz (≈50g)";
    }
    else{
      if(tipo==="alto") base = "1 taza arroz (≈200g)";
      else if(tipo==="medio") base = "¾ taza arroz (≈150g)";
      else base = "½ taza arroz (≈100g)";
    }

    return base + " 🔄 (puedes cambiar por 2 tortillas o 1 papa)";
  }

  // 🔥 FRUTA
  function fruta(){
    if(tipoFisico==="obesidad" || tipoFisico==="sobrepeso"){
      return "1 manzana verde o 1 toronja";
    }
    return "1 plátano o 1 manzana roja";
  }

  // 🔥 ENSALADA PRO
  function ensalada(){
    return "1 bowl grande (2 tazas): lechuga + pepino + jitomate + zanahoria + limón";
  }

  // 🔥 GRASAS REALES
  function grasaReal(){
    let opciones = [
      "10 almendras (≈10g grasa)",
      "10 nueces (≈10g grasa)",
      "1 cucharada mantequilla de maní (≈15g)",
      "¼ aguacate (≈10g grasa)"
    ];
    return opciones[Math.floor(Math.random()*opciones.length)];
  }

  // 🥣 DESAYUNO
  comidas.push({
    nombre:"Desayuno",
    proteina: esNino ? "2 huevos + 2 claras" : "6 claras + 2 huevos",
    carbos: "½–¾ taza avena (≈40–60g)",
    grasa:"1 cucharada mantequilla de maní",
    extra: fruta()
  });

  // 🍗 MEDIA MAÑANA
  comidas.push({
    nombre:"Media mañana",
    proteina: proteFuente(),
    carbos: carb("medio"),
    grasa: grasaReal(),
    extra: ensalada()
  });

  // 🍚 COMIDA
  comidas.push({
    nombre:"Comida",
    proteina: proteFuente(),
    carbos: carb("alto"),
    grasa:"sin grasa añadida",
    extra:"1 taza verduras cocidas (calabaza + zanahoria + brócoli)"
  });

  // 🥤 POST
  comidas.push({
    nombre:"Post-entreno",
    proteina: (tomaWhey && !esNino) 
      ? "1 scoop whey + 1 fruta" 
      : proteFuente(),
    carbos:"1 fruta + arroz",
    grasa:"0 grasa",
    extra:"⚡ recuperación muscular"
  });

  // 🥩 CENA
  comidas.push({
    nombre:"Cena",
    proteina: proteFuente(),
    carbos: tipoFisico.includes("obesidad") ? "sin carbohidratos" : carb("bajo"),
    grasa:"¼ aguacate",
    extra: ensalada()
  });

  return {
    titulo:`🔥 Dieta PRO de ${nombre}`,
    calorias:`${calorias} kcal`,
    proteina:`${proteina} g`,
    carbos:`${carbos} g`,
    grasa:`${grasa} g`,
    comidas,

    // 🔥 🔥 🔥 NIVEL DIOS EXTRA 🔥 🔥 🔥
    tips:[
      "🥗 Cocina con aceite de aguacate (no necesitas más grasa extra)",
      "💧 Toma 2–3 litros de agua al día",
      "🔥 Si tienes hambre: pepino, jícama o gelatina light",
      "🍳 Puedes cocinar en sartén, vapor o asado (no freír)"
    ],

    ejemplos:[
      "🍚 1 taza arroz = un puño grande",
      "🥩 100g carne = tamaño de tu palma",
      "🥑 ¼ aguacate = 2 cucharadas"
    ],

    intercambios:[
      "🍚 Arroz ↔ 2 tortillas",
      "🥔 Papa ↔ arroz",
      "🥑 Aguacate ↔ nueces o almendras",
      "🥩 Pollo ↔ atún o carne magra"
    ]
  };
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card" contenteditable="true">
  <h2>${nombre || "Cliente"}</h2>
  <p>${fecha}</p>
  <p>🔥 ${dieta.calorias}</p>
  <p>🥩 ${dieta.proteina}</p>
  <p>🍚 ${dieta.carbos}</p>
  <p>🥑 ${dieta.grasa}</p>`;

  // 🍽️ COMIDAS
  dieta.comidas.forEach(c=>{
    html += `<div class="card-meal">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>
        ${c.extra ? `<li>➕ ${c.extra}</li>` : ""}
      </ul>
    </div>`;
  });

  // 📌 RECOMENDACIONES
  html += `<div class="card-meal">
    <h4>📌 Recomendaciones</h4>
    ✔ Cocinar con aceite de aguacate o coco<br>
    ✔ Tomar 3-4L agua diarios<br>
    ✔ Agua de jamaica, limón o pepino con stevia<br>
    ✔ Evitar ultraprocesados<br>
    ✔ Caminar diario (aunque sea 20 min)<br>
  </div>`;

  // ❌ EVITAR
  html += `<div class="card-meal">
    <h4>🚫 Evitar</h4>
    ✔ Refrescos<br>
    ✔ Jugos procesados<br>
    ✔ Comida rápida (tacos, pizzas, etc.)<br>
    ✔ Exceso de azúcar<br>
  </div>`;

  // 🍽️ HAMBRE
  html += `<div class="card-meal">
    <h4>🍽️ Si tienes hambre</h4>
    ✔ Pepino / jícama libre<br>
    ✔ Verduras libres<br>
    ✔ Gelatina light<br>
  </div>`;

  // 🔥 FIRMA PRO (AQUÍ VA)
  html += `<p style="text-align:center; font-weight:bold; margin-top:25px;">
  💎 Plan personalizado por Charly Fitness
  </p>`;

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== DESCARGAR PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  if(!elemento.innerText.trim()){
    alert("Primero genera algo bro 🔥");
    return;
  }

  let nombre = document.getElementById("nombreCliente").value || "Cliente";

  // 🔒 quitar edición
  let editable = elemento.querySelector(".dieta-card");
  if(editable) editable.setAttribute("contenteditable", "false");

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const pageHeight = 297;

  /* ==========================
     🔥 PORTADA PREMIUM
  ========================== */

  // fondo negro
  pdf.setFillColor(10,10,10);
  pdf.rect(0,0,pageWidth,pageHeight,"F");

  // logo
  let img = new Image();
  img.src = "imagenes/logoGitHub.png";

  await new Promise(resolve => {
    img.onload = resolve;
  });

  pdf.addImage(img, "PNG", 55, 40, 100, 60);

  // título dorado
  pdf.setTextColor(212,175,55);
  pdf.setFont("helvetica","bold");
  pdf.setFontSize(24);
  pdf.text("PLAN PERSONALIZADO", 105, 120, null, null, "center");

  pdf.setFontSize(20);
  pdf.text(nombre.toUpperCase(), 105, 135, null, null, "center");

  // frase
  pdf.setFontSize(12);
  pdf.setTextColor(255,255,255);
  pdf.text("Disciplina > Motivación", 105, 160, null, null, "center");

  pdf.setFontSize(10);
  pdf.text("Charly Fitness", 105, 270, null, null, "center");

  /* ==========================
     🔥 CONTENIDO (PÁGINAS)
  ========================== */

  // clonar contenido
  let clon = elemento.cloneNode(true);

  clon.style.background = "white";
  clon.style.padding = "30px";
  clon.style.width = "800px";
  clon.style.position = "absolute";
  clon.style.left = "-9999px";

  document.body.appendChild(clon);

  const canvas = await html2canvas(clon, { scale: 2 });

  document.body.removeChild(clon);

  const margin = 10;
  const usableWidth = pageWidth - margin * 2;

  const imgWidth = usableWidth;
  const pageHeightPx = (canvas.width * (pageHeight - margin*2)) / usableWidth;

  let position = 0;
  let page = 0;

  while(position < canvas.height){

    let pageCanvas = document.createElement("canvas");
    let pageCtx = pageCanvas.getContext("2d");

    pageCanvas.width = canvas.width;
    pageCanvas.height = pageHeightPx;

    pageCtx.drawImage(
      canvas,
      0, position,
      canvas.width, pageHeightPx,
      0, 0,
      canvas.width, pageHeightPx
    );

    let imgData = pageCanvas.toDataURL("image/jpeg", 1.0);

    pdf.addPage();

    // fondo claro
    pdf.setFillColor(255,255,255);
    pdf.rect(0,0,pageWidth,pageHeight,"F");

    // header dorado
    pdf.setFillColor(212,175,55);
    pdf.rect(0,0,pageWidth,10,"F");

    pdf.addImage(
      imgData,
      "JPEG",
      margin,
      15,
      imgWidth,
      pageHeight - 25
    );

    position += pageHeightPx;
    page++;
  }

  pdf.save(nombre + "_Plan_Premium.pdf");

  if(editable) editable.setAttribute("contenteditable", "true");
}
/* ===================== RUTINA ===================== */
function generarRutina(){
  let sexo=document.getElementById("sexo").value;
  let dias=parseInt(document.getElementById("diasGym").value)||3;
  function getSplit(){
    if(sexo==="mujer"){
      if(dias<=3) return ["Pierna + glúteo","Tren superior","Pierna"];
      if(dias===4) return ["Glúteo","Espalda","Pierna","Glúteo + abdomen"];
      return ["Glúteo","Pierna","Espalda","Pierna","Glúteo"];
    } else {
      if(dias<=3) return ["Push","Pull","Pierna"];
      if(dias===4) return ["Pecho","Espalda","Pierna","Hombro + brazos"];
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
  }
  const ejercicios={
    "Pecho":["Press banca 4x10","Aperturas 3x12","Fondos 3x12"],
    "Espalda":["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    "Pierna":["Sentadilla 4x10","Prensa 3x12","Femoral 3x12","Pantorrilla 4x15"],
    "Hombro":["Press militar 4x10","Elevaciones laterales 3x12","Pájaros 3x12"],
    "Bíceps":["Curl barra 3x12","Curl martillo 3x12"],
    "Tríceps":["Fondos 3x12","Extensión polea 3x12"],
    "Glúteo":["Hip thrust 4x12","Patada glúteo 3x15","Puente glúteo 3x15"],
    "Abdomen":["Plancha 3x60s","Crunch 3x15","Elevación piernas 3x12"]
  };
  const splitMap={
    "Push":["Pecho","Hombro","Tríceps"],
    "Pull":["Espalda","Bíceps"],
    "Hombro + brazos":["Hombro","Bíceps","Tríceps"],
    "Tren superior":["Pecho","Espalda","Hombro","Bíceps","Tríceps"],
    "Glúteo + abdomen":["Glúteo","Abdomen"]
  };
  let split=getSplit();
  let html=`<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;
  split.forEach((dia,i)=>{
    html+=`<div class="card-meal">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;
    let grupos = splitMap[dia] || [dia];
    grupos.forEach(g=>{
      let lista = ejercicios[g] || ["Ejercicio base 3x12"];
      html+=`<strong>${g}</strong><ul>`;
      lista.forEach(e=>{html+=`<li>${e}</li>`;});
      html+=`</ul>`;
    });
    html+=`<p>🔥 Cardio: ${sexo==="mujer"? "20-30 min":"20-35 min"}</p>
           <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById("resultadoPRO").innerHTML=html;
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
