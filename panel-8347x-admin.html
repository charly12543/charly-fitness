<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO (FIX PRINCIPAL) ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){

  let {peso, altura, edad, objetivo, sexo, nivel} = datos;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer" ? -161 : 5);

  // 🔥 ACTIVIDAD SEGÚN DÍAS
  let factorActividad = 1.2;
  if(dias >= 2 && dias <= 3) factorActividad = 1.4;
  if(dias >= 4 && dias <= 5) factorActividad = 1.55;
  if(dias >= 6) factorActividad = 1.7;

  let calorias = Math.round(bmr * factorActividad);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
  }

  // 🔥 PROTEÍNA SEGÚN NIVEL
  let proteBase = {
    novato: 1.6,
    intermedio: 1.8,
    avanzado: 2,
    competidor: 2.2
  };

  let proteina = Math.round(peso * proteBase[nivel]);

  // 🔥 MACROS REALES
  let grasa = Math.round((calorias * 0.25) / 9);
  let caloriasProte = proteina * 4;
  let caloriasGrasa = grasa * 9;
  let caloriasRestantes = calorias - (caloriasProte + caloriasGrasa);
  let carbos = Math.round(caloriasRestantes / 4);

  // 🔥 ALIMENTOS BASE
  const proteinas = [
    "150g pechuga de pollo",
    "180g pescado",
    "150g carne magra",
    "4 claras + 1 huevo entero",
    "1 scoop proteína whey"
  ];

  const carbosBase = [
    "2 tortillas de maíz",
    "1 taza de arroz",
    "1 pan integral",
    "1 taza de avena"
  ];

  const grasas = [
    "cocinar con aceite de aguacate",
    "cocinar con aceite de coco",
    "1/4 de aguacate",
    "10 almendras"
  ];

  const verduras = [
    "verduras al gusto",
    "ensalada libre"
  ];

  const frutas = [
    "1 fruta (manzana, plátano o papaya)",
    "1 taza de fruta"
  ];

  let comidas = [];

  // 🔥 NOVATO (SIMPLE)
  if(nivel === "novato"){
    comidas.push({
      nombre:"Desayuno",
      proteina:"Huevos con jamón",
      carbos:"2 tortillas de maíz",
      grasa:"Aguacate",
      verdura:"",
      fruta:"1 fruta"
    });

    comidas.push({
      nombre:"Comida",
      proteina:"150g pechuga de pollo",
      carbos:"1 taza de arroz",
      grasa:"cocinar con aceite de aguacate",
      verdura:"verduras al gusto",
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina:"Atún o pollo",
      carbos:"2 tostadas horneadas",
      grasa:"Aguacate",
      verdura:"verduras libres",
      fruta:""
    });
  }

  // 🔥 INTERMEDIO
  else if(nivel === "intermedio"){
    comidas.push({
      nombre:"Desayuno",
      proteina: random(proteinas),
      carbos: random(carbosBase),
      grasa: random(grasas),
      verdura:"",
      fruta: random(frutas)
    });

    comidas.push({
      nombre:"Comida",
      proteina: random(proteinas),
      carbos: random(carbosBase),
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina: random(proteinas),
      carbos: random(carbosBase),
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });
  }

  // 🔥 AVANZADO
  else if(nivel === "avanzado"){
    comidas.push({
      nombre:"Desayuno",
      proteina: random(proteinas),
      carbos: "1 taza de avena",
      grasa: random(grasas),
      verdura:"",
      fruta: random(frutas)
    });

    comidas.push({
      nombre:"Comida",
      proteina: random(proteinas),
      carbos: "1 taza de arroz",
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });

    comidas.push({
      nombre:"Pre-entreno",
      proteina:"1 scoop proteína whey",
      carbos:"1 plátano",
      grasa:"5 almendras",
      verdura:"",
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina: random(proteinas),
      carbos: objetivo === "definicion" ? "verduras al gusto" : "1/2 taza de arroz",
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });
  }

  // 🔥 COMPETIDOR (MÁS ESTRICTO)
  else {
    comidas.push({
      nombre:"Desayuno",
      proteina:"4 claras + 1 huevo",
      carbos:"1/2 taza avena",
      grasa:"5 almendras",
      verdura:"",
      fruta:""
    });

    comidas.push({
      nombre:"Comida",
      proteina:"150g pollo",
      carbos:"1 taza arroz",
      grasa:"cocinar con aceite de coco",
      verdura:"verduras al gusto",
      fruta:""
    });

    comidas.push({
      nombre:"Pre-entreno",
      proteina:"1 scoop proteína whey",
      carbos:"1 plátano",
      grasa:"",
      verdura:"",
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina:"180g pescado",
      carbos:"verduras al gusto",
      grasa:"",
      verdura:"ensalada libre",
      fruta:""
    });
  }

  return {
    calorias,
    proteina,
    carbos,
    grasa,
    comidas
  };
}
/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional Personalizado</p>
    </div>

    <div style="text-align:center; margin-bottom:25px;">
      <h2>${nombre || "Cliente"}</h2>
      <p>📅 ${fecha}</p>
    </div>

    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
      🔥 ${dieta.calorias} kcal<br>
      🥩 ${dieta.proteina}g proteína<br>
      🍚 ${dieta.carbos}g carbohidratos<br>
      🥑 ${dieta.grasa}g grasas
    </div>`;

  dieta.comidas.forEach(c=>{
    html += `<div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>`;
    if(c.verdura) html += `<li>🥦 ${c.verdura}</li>`;
    if(c.fruta) html += `<li>🍎 ${c.fruta}</li>`;
    html += `</ul></div>`;
  });

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== RUTINA ===================== */
function generarRutina(){

  let sexo = document.getElementById("sexo").value;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;
  let nivel = document.getElementById("nivel").value;

  // 🔥 SPLIT SEGÚN NIVEL
  function getSplit(){
    if(nivel === "novato"){
      return ["Full Body","Full Body","Full Body"];
    }
    if(nivel === "intermedio"){
      return ["Pecho + tríceps","Espalda + bíceps","Pierna","Hombro"];
    }
    if(nivel === "avanzado"){
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
    return ["Push","Pull","Pierna","Hombro","Pierna","Full Body"];
  }

  // 🔥 EJERCICIOS BASE
  const base = {
    pecho:["Press banca","Aperturas","Press inclinado","Fondos"],
    espalda:["Remo barra","Jalón polea","Peso muerto","Remo mancuerna"],
    pierna:["Sentadilla","Prensa","Femoral","Extensión","Pantorrilla"],
    hombro:["Press militar","Elevaciones laterales","Pájaros"],
    biceps:["Curl barra","Curl martillo"],
    triceps:["Fondos","Extensión polea"]
  };

  function generarLista(grupo){
    let ejercicios = base[grupo] || ["Ejercicio base"];

    let volumen = 3;

    if(nivel === "intermedio") volumen = 4;
    if(nivel === "avanzado") volumen = 5;
    if(nivel === "competidor") volumen = 6;

    return ejercicios.slice(0, volumen).map(e => `${e} 3x10`);
  }

  let split = getSplit();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;

  split.forEach((dia, i)=>{

    html += `<div class="card-meal no-break">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;

    let grupos = dia.toLowerCase().split("+");

    grupos.forEach(g=>{
      let grupo = g.trim();

      let lista = [];

      if(grupo === "push"){
        lista = [...generarLista("pecho"), ...generarLista("hombro"), ...generarLista("triceps")];
      }
      else if(grupo === "pull"){
        lista = [...generarLista("espalda"), ...generarLista("biceps")];
      }
      else if(grupo === "full body"){
        lista = [
          ...generarLista("pecho"),
          ...generarLista("espalda"),
          ...generarLista("pierna")
        ];
      }
      else{
        lista = generarLista(grupo);
      }

      html += `<ul>`;
      lista.forEach(e=>{
        html += `<li>${e}</li>`;
      });
      html += `</ul>`;
    });

    // 🔥 AJUSTE CARDIO SEGÚN NIVEL
    let cardio = "20 min";
    if(nivel === "avanzado") cardio = "25-30 min";
    if(nivel === "competidor") cardio = "30-40 min";

    html += `
      <p>🔥 Cardio: ${cardio}</p>
      <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}
/* ===================== WHATS ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numero=prompt("Número cliente (52XXXXXXXXXX)","52");

  if(!numero){
    alert("Falta número bro");
    return;
  }

  let msg=`Hola ${nombre}, gracias por tu compra 🔥%0A%0AAquí tienes tu plan.%0ADisfrútalo 💪`;

  window.open(`https://wa.me/${numero}?text=${msg}`);
}
</script>



<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

</body>
</html>
