<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>
<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>

<script>
/* ===================== USAR PRO ===================== */
function usarPro(){
  let datos = {
    nombre: document.getElementById("nombreCliente").value,
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value,
    tomaWhey: document.getElementById("tomaWhey").value==="true"
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){
  let {nombre, peso, altura, edad, objetivo, sexo, nivel, tomaWhey} = datos;

  if(altura > 3) altura = altura / 100;

  // 🔥 IMC Y TIPO
  let imc = peso / (altura * altura);
  let tipoFisico = "fit";

  if(imc >= 30) tipoFisico = "obesidad";
  else if(imc >= 25) tipoFisico = "sobrepeso";

  // 🔥 CALORÍAS BASE
  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo==="mujer"?-161:5);
  let calorias = Math.round(bmr * 1.55);

  // 🔥 AJUSTE INTELIGENTE
  if(tipoFisico==="obesidad") calorias -= 800;
  else if(tipoFisico==="sobrepeso") calorias -= 500;
  else if(objetivo==="volumen") calorias += 300;

  // 🔥 MACROS
  let proteina = Math.round(peso * 2.2);
  let grasa = Math.round((calorias * 0.25)/9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  let comidas = [];

  function proteFuente(){
    return Math.round(peso * 1.5) + "g pollo / carne / pescado";
  }

  // 🔥 CARBOS SEGÚN TIPO
  function carb(tipo){
    if(tipoFisico==="obesidad"){
      if(tipo==="alto") return "100g arroz / papa";
      if(tipo==="medio") return "50g arroz";
      return "verduras + ensalada";
    }

    if(tipoFisico==="sobrepeso"){
      if(tipo==="alto") return "150g arroz / papa";
      if(tipo==="medio") return "100g arroz";
      return "50g arroz";
    }

    // FIT
    if(tipo==="alto") return "200g arroz";
    if(tipo==="medio") return "120g arroz";
    return "80g arroz";
  }

  // 🥣 DESAYUNO
  comidas.push({
    nombre:"Desayuno",
    proteina:"6 claras + 2 huevos",
    carbos: tipoFisico==="obesidad" ? "40g avena" : "60g avena",
    grasa:"1 cucharada mantequilla de maní",
    extra:"1 fruta"
  });

  // 🍗 COMIDA 2
  comidas.push({
    nombre:"Comida 2",
    proteina: proteFuente(),
    carbos: carb("medio"),
    grasa:"1 cucharadita aceite de oliva",
    extra:"verduras"
  });

  // 🍚 PRE ENTRENO
  comidas.push({
    nombre:"Pre-entreno",
    proteina: proteFuente(),
    carbos: carb("alto"),
    grasa:"baja grasa",
    extra:""
  });

  // 🥤 POST ENTRENO
  comidas.push({
    nombre:"Post-entreno",
    proteina: tomaWhey ? "1 scoop whey" : proteFuente(),
    carbos:"rápidos (plátano + arroz)",
    grasa:"0 grasa",
    extra:""
  });

  // 🥩 CENA
  comidas.push({
    nombre:"Cena",
    proteina: proteFuente(),
    carbos: tipoFisico==="obesidad" ? "sin carbos" : carb("bajo"),
    grasa:"½ aguacate",
    extra:"ensalada grande"
  });

  return {
    titulo:`🔥 Dieta ${tipoFisico.toUpperCase()} de ${nombre}`,
    calorias:`${calorias} kcal`,
    proteina:`${proteina} g`,
    carbos:`${carbos} g`,
    grasa:`${grasa} g`,
    comidas
  };
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre=document.getElementById("nombreCliente").value;
  let fecha=new Date().toLocaleDateString();

  let html=`<div class="dieta-card" contenteditable="true">
  <h2>${nombre||"Cliente"}</h2>
  <p>${fecha}</p>
  <p>🔥 ${dieta.calorias}</p>
  <p>🥩 ${dieta.proteina}</p>
  <p>🍚 ${dieta.carbos}</p>
  <p>🥑 ${dieta.grasa}</p>`;

  dieta.comidas.forEach(c=>{
    html+=`<div class="card-meal">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>
        ${c.extra?`<li>➕ ${c.extra}</li>`:""}
      </ul>
    </div>`;
  });

  html+=`<div class="card-meal">
    <h4>📌 Recomendaciones</h4>
    ✔ Cocinar con aceite de aguacate o coco<br>
    ✔ 3-4L agua diarios<br>
    ✔ Jamaica o limón con stevia<br>
    ✔ Evitar ultraprocesados
  </div>

  <div class="card-meal">
    <h4>🍽️ Hambre</h4>
    ✔ Pepino/jícama libre<br>
    ✔ Verduras libres<br>
    ✔ Gelatina light
  </div>
  </div>`;

  document.getElementById("resultadoPRO").innerHTML=html;
}

/* ===================== DESCARGAR PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  if(!elemento.innerText.trim()){
    alert("Primero genera algo bro 🔥");
    return;
  }

  // 🔒 quitar edición temporalmente
  let editable = elemento.querySelector(".dieta-card");
  if(editable) editable.setAttribute("contenteditable", "false");

  const canvas = await html2canvas(elemento, { scale: 2 });

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const pageHeight = 297;

  const imgWidth = pageWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  // 🔥 ALTURA DE CORTE EN PIXELES
  const pageHeightPx = (canvas.width * pageHeight) / pageWidth;

  let position = 0;
  let pageCanvas = document.createElement("canvas");
  let pageCtx = pageCanvas.getContext("2d");

  pageCanvas.width = canvas.width;
  pageCanvas.height = pageHeightPx;

  let page = 0;

  while(position < canvas.height){

    // limpiar canvas temporal
    pageCtx.clearRect(0, 0, pageCanvas.width, pageCanvas.height);

    // 🔥 recortar parte del canvas original
    pageCtx.drawImage(
      canvas,
      0, position,
      canvas.width, pageHeightPx,
      0, 0,
      canvas.width, pageHeightPx
    );

    let imgData = pageCanvas.toDataURL("image/jpeg", 1.0);

    if(page > 0) pdf.addPage();

    pdf.addImage(imgData, "JPEG", 0, 0, imgWidth, pageHeight);

    position += pageHeightPx;
    page++;
  }

  pdf.save(tipo + ".pdf");

  // 🔓 reactivar edición
  if(editable) editable.setAttribute("contenteditable", "true");
}

/* ===================== WHATSAPP ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numero=prompt("Número cliente","52");
  if(!numero)return;
  let msg=`Hola ${nombre} 🔥 aquí tienes tu plan`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}

/* ===================== RUTINA ===================== */
function generarRutina(){
  let sexo=document.getElementById("sexo").value;
  let dias=parseInt(document.getElementById("diasGym").value)||3;
  function getSplit(){
    if(sexo==="mujer"){
      if(dias<=3) return ["Pierna + glúteo","Tren superior","Pierna"];
      if(dias===4) return ["Glúteo","Espalda","Pierna","Glúteo + abdomen"];
      return ["Glúteo","Pierna","Espalda","Pierna","Glúteo"];
    } else {
      if(dias<=3) return ["Push","Pull","Pierna"];
      if(dias===4) return ["Pecho","Espalda","Pierna","Hombro + brazos"];
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
  }
  const ejercicios={
    "Pecho":["Press banca 4x10","Aperturas 3x12","Fondos 3x12"],
    "Espalda":["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    "Pierna":["Sentadilla 4x10","Prensa 3x12","Femoral 3x12","Pantorrilla 4x15"],
    "Hombro":["Press militar 4x10","Elevaciones laterales 3x12","Pájaros 3x12"],
    "Bíceps":["Curl barra 3x12","Curl martillo 3x12"],
    "Tríceps":["Fondos 3x12","Extensión polea 3x12"],
    "Glúteo":["Hip thrust 4x12","Patada glúteo 3x15","Puente glúteo 3x15"],
    "Abdomen":["Plancha 3x60s","Crunch 3x15","Elevación piernas 3x12"]
  };
  const splitMap={
    "Push":["Pecho","Hombro","Tríceps"],
    "Pull":["Espalda","Bíceps"],
    "Hombro + brazos":["Hombro","Bíceps","Tríceps"],
    "Tren superior":["Pecho","Espalda","Hombro","Bíceps","Tríceps"],
    "Glúteo + abdomen":["Glúteo","Abdomen"]
  };
  let split=getSplit();
  let html=`<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;
  split.forEach((dia,i)=>{
    html+=`<div class="card-meal">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;
    let grupos = splitMap[dia] || [dia];
    grupos.forEach(g=>{
      let lista = ejercicios[g] || ["Ejercicio base 3x12"];
      html+=`<strong>${g}</strong><ul>`;
      lista.forEach(e=>{html+=`<li>${e}</li>`;});
      html+=`</ul>`;
    });
    html+=`<p>🔥 Cardio: ${sexo==="mujer"? "20-30 min":"20-35 min"}</p>
           <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });
  html+=`</div>`;
  document.getElementById("resultadoPRO").innerHTML=html;
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
