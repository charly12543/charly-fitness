<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>⚡ Tipo de dieta</label>
  <select id="tipoDieta">
    <option value="normal">Normal</option>
    <option value="keto">Keto</option>
    <option value="godin">Godín</option>
    <option value="runner">Runner</option>
  </select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>

<script>
/* ===================== DIETA PRO ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    tipo: document.getElementById("tipoDieta").value
  };
  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }
  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

// ---------------- GENERAR DIETA ----------------
function generarDietaPRO(datos){
  let {peso, altura, edad, objetivo, tipo} = datos;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + 5;
  let calorias = Math.round(bmr * 1.55);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteina, grasa, carbos;

  if(tipo === "keto"){
    proteina = Math.round(peso * 2);
    grasa = Math.round((calorias * 0.65)/9);
    carbos = Math.round((calorias*0.10)/4);
  } else if(tipo === "runner"){
    proteina = Math.round(peso*1.8);
    grasa = Math.round((calorias*0.2)/9);
    carbos = Math.round((calorias*0.6)/4);
  } else if(tipo === "godin"){
    proteina = Math.round(peso*2);
    grasa = Math.round((calorias*0.25)/9);
    carbos = Math.round((calorias*0.4)/4);
  } else {
    proteina = Math.round(peso*2);
    grasa = Math.round((calorias*0.25)/9);
    carbos = Math.round((calorias-(proteina*4 + grasa*9))/4);
  }

  let protePorComida = Math.round(proteina/4);
  let carbosPorComida = Math.round(carbos/4);
  let grasaPorComida = Math.round(grasa/4);

  const nombresComida = ["Desayuno", "Comida", "Pre-entreno", "Cena"];

  // ---------------- OPCIONES DE ALIMENTOS ----------------
  const proteinas = [
    {nombre:"Pollo", prote:31},
    {nombre:"Pescado", prote:25},
    {nombre:"Huevo", prote:6},
    {nombre:"Carne magra", prote:26},
    {nombre:"Whey protein", prote:30, medida:"scoop"} // 1 scoop ~30g proteína
  ];
  const carbosLista = [
    {nombre:"Arroz hervido", carbos:28, medida:"taza"},
    {nombre:"Purée de papa", carbos:20, medida:"taza"},
    {nombre:"Purée de plátano macho", carbos:30, medida:"taza"},
    {nombre:"Avena", carbos:60, medida:"taza"},
    {nombre:"Pan árabe", carbos:15, medida:"rebanada"},
    {nombre:"Pasta cocida", carbos:30, medida:"taza"}
  ];
  const grasasLista = [
    {nombre:"Aceite de oliva", grasa:10, medida:"cucharada"},
    {nombre:"Aguacate", grasa:15, medida:"pieza"},
    {nombre:"Nueces", grasa:14, medida:"20g"}
  ];
  const frutas = [
    {nombre:"Melón"}, {nombre:"Papaya"}, {nombre:"Manzana verde"}, {nombre:"Manzana roja"}, {nombre:"Naranja"}, {nombre:"Toronja"}
  ];
  const verduras = [
    {nombre:"Lechuga"}, {nombre:"Jitomate"}, {nombre:"Espinaca"}, {nombre:"Camote"}
  ];

  function random(arr){return arr[Math.floor(Math.random()*arr.length)];}

  function calcularProte(p, gramos){
    if(p.medida === "scoop"){
      let scoops = Math.round(gramos / p.prote);
      return `${scoops} scoop(s) ${p.nombre}`;
    } else {
      let g = Math.round((gramos/p.prote)*100);
      return `${g}g ${p.nombre}`;
    }
  }

  function calcularCarbos(c, gramos){
    if(c.medida === "taza"){
      let tazas = Math.round(gramos / c.carbos);
      return `${tazas} taza(s) ${c.nombre}`;
    } else if(c.medida === "rebanada"){
      let r = Math.round(gramos / c.carbos);
      return `${r} rebanada(s) ${c.nombre}`;
    } else {
      let g = Math.round((gramos / c.carbos) * 100);
      return `${g}g ${c.nombre}`;
    }
  }

  function calcularGrasa(g, gramos){
    if(g.medida === "cucharada"){
      let c = Math.round(gramos / g.grasa);
      return `${c} cucharada(s) ${g.nombre}`;
    } else if(g.medida === "pieza"){
      let p = Math.round(gramos / g.grasa);
      return `${p} pieza(s) ${g.nombre}`;
    } else {
      let x = Math.round((gramos / g.grasa)*100);
      return `${x}g ${g.nombre}`;
    }
  }

  let comidas = [];

  for(let i=0;i<4;i++){
    let p = random(proteinas);
    let c = random(carbosLista);
    let g = random(grasasLista);
    let v = random(verduras);
    let f = (i===2)? random(frutas) : null; // fruta solo pre-entreno

    comidas.push({
      nombre: nombresComida[i],
      proteina: calcularProte(p, protePorComida),
      carbos: calcularCarbos(c, carbosPorComida),
      grasa: calcularGrasa(g, grasaPorComida),
      verdura: `${v.nombre} 50-80g`,
      fruta: f? f.nombre : ""
    });
  }

  return {calorias, proteina, carbos, grasa, comidas};
}

// ---------------- MOSTRAR DIETA ----------------
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional Personalizado</p>
    </div>
    <div style="text-align:center; margin-bottom:25px;">
      <h2>${nombre || "Cliente"}</h2>
      <p>📅 ${fecha}</p>
    </div>
    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
      <p>
        🔥 ${dieta.calorias} kcal<br>
        🥩 ${dieta.proteina}g proteína<br>
        🍚 ${dieta.carbos}g carbohidratos<br>
        🥑 ${dieta.grasa}g grasas
      </p>
    </div>`;

  dieta.comidas.forEach((c,i)=>{
    html += `<div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>
        <li>🥦 Verdura: ${c.verdura}</li>`;
    if(c.fruta) html += `<li>🍎 Fruta: ${c.fruta}</li>`;
    html += `</ul></div>`;
  });

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ---------------- GENERAR RUTINA ---------------- */
function generarRutina(){
  let nombre = document.getElementById("nombreCliente").value || "Cliente";
  let sexo = document.getElementById("sexo").value;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  let rutina = [];

  const ejerciciosHombre = {
    Pecho:["Press banca 4x10","Aperturas mancuernas 3x12","Fondos 3x15"],
    Espalda:["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    Hombros:["Press militar 4x10","Elevaciones laterales 3x12","Facepull 3x15"],
    Bíceps:["Curl barra 4x12","Curl martillo 3x12"],
    Tríceps:["Press francés 4x12","Fondos 3x15"],
    Pierna:["Sentadillas 4x10","Prensa 3x12","Curl femoral 3x12","Gemelos 4x15"]
  };

  const ejerciciosMujer = {
    Pierna:["Sentadillas 4x12","Hip thrust 4x12","Prensa 3x15","Gemelos 3x20"],
    Glúteo:["Patada glúteo 3x15","Abducción 3x20"],
    Core:["Plancha 3x60s","Crunch 3x20","Russian twist 3x20"],
    Espalda:["Remo mancuerna 4x12","Jalón polea 3x12"],
    Hombros:["Elevaciones laterales 3x12","Press militar 3x10"],
    Brazos:["Curl bíceps 3x12","Extensión tríceps 3x12"]
  };

  let pool = sexo==="hombre"? ejerciciosHombre: ejerciciosMujer;
  let grupos = Object.keys(pool);

  for(let i=0;i<dias;i++){
    let diaNombre = `Día ${i+1}`;
    let ejeDia=[];
    for(let j=0;j<3;j++){
      let idx=(i+j)%grupos.length;
      ejeDia.push({grupo:grupos[idx], ejercicios:pool[grupos[idx]]});
    }
    rutina.push({dia:diaNombre,bloques:ejeDia});
  }

  let html=`<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan de Entrenamiento Personalizado</p>
    </div>`;

  rutina.forEach(d=>{
    html+=`<div class="card-meal no-break">
      <h4>🏋️ ${d.dia}</h4>`;
    d.bloques.forEach(b=>{
      html+=`<strong>${b.grupo}</strong><ul>`;
      b.ejercicios.forEach(e=>{
        html+=`<li>${e}</li>`;
      });
      html+=`</ul>`;
    });
    html+=`</div>`;
  });

  html+=`</div>`;
  document.getElementById("resultadoPRO").innerHTML=html;
}

/* ---------------- DESCARGAR PDF ---------------- */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");
  if(!elemento.innerText.trim()){
    alert("Primero genera la " + tipo + " bro 🔥");
    return;
  }
  const nombre=document.getElementById("nombreCliente").value||"Cliente";
  let fecha=new Date().toLocaleDateString();
  let planID="CF-"+Math.floor(Math.random()*9000+1000);
  let canvas = await html2canvas(elemento,{scale:2,useCORS:true,backgroundColor:"#ffffff"});
  let imgData = canvas.toDataURL("image/jpeg",1.0);
  let pdf = new jsPDF("p","mm","a4");
  const imgWidth=210;
  const imgHeight=(canvas.height*imgWidth)/canvas.width;
  pdf.addImage(imgData,"JPEG",0,10,imgWidth,imgHeight>280?280:imgHeight);
  pdf.save(`${tipo}-${nombre}.pdf`);
}

/* ---------------- WHATSAPP ---------------- */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numeroCliente=prompt("Ingresa el número de WhatsApp del cliente (52XXXXXXXXXX)","52");
  if(!numeroCliente){ alert("Debes ingresar el número"); return;}
  let mensaje=`Hola ${nombre}, gracias por tu compra! Aquí están tus planes:`+
  `%0A%0A🍽️ Dieta: [link al PDF dieta]%0A🏋️ Rutina: [link al PDF rutina]%0A%0ADisfruta tu entrenamiento!`;
  let url=`https://wa.me/${numeroCliente}?text=${encodeURIComponent(mensaje)}`;
  window.open(url,"_blank");
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
