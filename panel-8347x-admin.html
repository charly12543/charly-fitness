<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){

  let {peso, altura, edad, objetivo, sexo, nivel} = datos;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer" ? -161 : 5);

  let factorActividad = dias<=3 ? 1.4 : dias<=5 ? 1.55 : 1.7;

  let calorias = Math.round(bmr * factorActividad);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteina = Math.round(peso * (nivel==="competidor"?2.2:nivel==="avanzado"?2:nivel==="intermedio"?1.8:1.6));

  let grasa = Math.round((calorias * 0.25) / 9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  // 🔥 AJUSTES HUMANOS
  let arroz = sexo==="mujer" ? "3/4 taza de arroz" : "1 taza de arroz";
  let avena = sexo==="mujer" ? "1/2 taza de avena" : "1 taza de avena";
  let carbosNoche = objetivo==="definicion" ? "1-2 tazas de verduras" : "1/2 taza de arroz";

  let comidas = [];

  if(nivel==="novato"){
    comidas = [
      {nombre:"Desayuno",proteina:"3 claras + 1 huevo entero + 40g jamón",carbos:"2 tortillas de maíz",grasa:"1/4 aguacate",verdura:"",fruta:"1 fruta"},
      {nombre:"Comida",proteina:"150g pollo",carbos:arroz,grasa:"1 cucharadita aceite de aguacate",verdura:"1 taza verduras",fruta:""},
      {nombre:"Cena",proteina:"120g pollo o atún",carbos:carbosNoche,grasa:"1/4 aguacate",verdura:"1 taza verduras",fruta:""}
    ];
  }

  else if(nivel==="intermedio"){
    comidas = [
      {nombre:"Desayuno",proteina:"4 claras + 1 huevo",carbos:avena,grasa:"1 cucharadita aceite de coco",fruta:"1 fruta"},
      {nombre:"Comida",proteina:"150g carne magra",carbos:arroz,grasa:"1 cucharadita aceite de aguacate",verdura:"1 taza verduras"},
      {nombre:"Cena",proteina:"150g pescado",carbos:carbosNoche,grasa:"10 almendras",verdura:"1 taza verduras"}
    ];
  }

  else if(nivel==="avanzado"){
    comidas = [
      {nombre:"Desayuno",proteina:"5 claras + 1 huevo",carbos:avena,grasa:"1 cucharadita aceite coco",fruta:"1 fruta"},
      {nombre:"Comida",proteina:"180g pollo",carbos:arroz,grasa:"1 cucharadita aceite aguacate",verdura:"1 taza verduras"},
      {nombre:"Pre-entreno",proteina:"1 scoop whey",carbos:"1 plátano",grasa:"5 almendras"},
      {nombre:"Cena",proteina:"150g pescado",carbos:carbosNoche,grasa:"1 cucharadita aceite oliva",verdura:"1 taza verduras"}
    ];
  }

  else{
    comidas = [
      {nombre:"Desayuno",proteina:"6 claras + 1 huevo",carbos: objetivo==="definicion"?"1/2 taza avena":avena,grasa:"5 almendras"},
      {nombre:"Comida",proteina:"180g pollo",carbos:arroz,grasa:"1 cucharadita aceite coco",verdura:"1 taza verduras"},
      {nombre:"Pre-entreno",proteina:"1 scoop whey",carbos:"1 plátano"},
      {nombre:"Cena",proteina:"180g pescado",carbos:carbosNoche,verdura:"ensalada libre"}
    ];
  }

  return {calorias,proteina,carbos,grasa,comidas};
}

/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card">
  <h2>${nombre||"Cliente"}</h2>
  <p>${fecha}</p>

  🔥 ${dieta.calorias} kcal<br>
  🥩 ${dieta.proteina}g proteína<br>
  🍚 ${dieta.carbos}g carbs<br>
  🥑 ${dieta.grasa}g grasas`;

  dieta.comidas.forEach(c=>{
    html+=`<div class="card-meal">
    <h4>🍽️ ${c.nombre}</h4>
    <ul>
    <li>🥩 ${c.proteina||""}</li>
    <li>🍚 ${c.carbos||""}</li>
    <li>🥑 ${c.grasa||""}</li>
    ${c.verdura?`<li>🥦 ${c.verdura}</li>`:""}
    ${c.fruta?`<li>🍎 ${c.fruta}</li>`:""}
    </ul></div>`;
  });

  html+=`
  <div class="card-meal">
  <h4>📌 Recomendaciones</h4>
  ✔ Cocinar con aceite de aguacate o coco<br>
  ✔ 3-4L agua diarios<br>
  ✔ Jamaica o limón con stevia<br>
  ✔ Evitar ultraprocesados
  </div>

  <div class="card-meal">
  <h4>🍽️ Hambre</h4>
  ✔ Pepino/jícama libre<br>
  ✔ Verduras libres<br>
  ✔ Gelatina light
  </div>
  </div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== RUTINA ===================== */
function generarRutina(){

  let sexo = document.getElementById("sexo").value;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  function getSplit(){
    if(sexo === "mujer"){
      if(dias <= 3){
        return ["Pierna + glúteo","Tren superior","Pierna"];
      }
      if(dias == 4){
        return ["Glúteo","Espalda","Pierna","Glúteo + abdomen"];
      }
      return ["Glúteo","Pierna","Espalda","Pierna","Glúteo"];
    } else {
      if(dias <= 3){
        return ["Pecho + tríceps","Espalda + bíceps","Pierna"];
      }
      if(dias == 4){
        return ["Pecho","Espalda","Pierna","Hombro + brazos"];
      }
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
  }

  const ejercicios = {
    "Pecho":["Press banca 4x10","Aperturas 3x12","Fondos 3x12"],
    "Espalda":["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    "Pierna":["Sentadilla 4x10","Prensa 3x12","Femoral 3x12","Pantorrilla 4x15"],
    "Hombro":["Press militar 4x10","Elevaciones laterales 3x12"],
    "Bíceps":["Curl barra 3x12","Curl martillo 3x12"],
    "Tríceps":["Fondos 3x12","Extensión polea 3x12"],
    "Glúteo":["Hip thrust 4x12","Patada glúteo 3x15"],
    "Tren superior":["Rutina completa tren superior"],
    "Glúteo + abdomen":["Hip thrust","Plancha 3x60s"],
    "Push":["Press banca","Press militar","Fondos"],
    "Pull":["Remo","Curl bíceps"]
  };

  let split = getSplit();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;

  split.forEach((dia, i)=>{
    html += `<div class="card-meal">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;

    let grupos = dia.split("+");

grupos.forEach(g=>{
  let grupo = g.trim().toLowerCase();

  // normalizar nombres
  if(grupo === "bíceps") grupo = "Bíceps";
  if(grupo === "tríceps") grupo = "Tríceps";
  if(grupo === "pecho") grupo = "Pecho";
  if(grupo === "espalda") grupo = "Espalda";
  if(grupo === "pierna") grupo = "Pierna";
  if(grupo === "hombro") grupo = "Hombro";
  if(grupo === "glúteo") grupo = "Glúteo";

  let lista = ejercicios[grupo] || ["Ejercicio base 3x12"];

      html += `<strong>${grupo}</strong><ul>`;
      lista.forEach(e=>{
        html += `<li>${e}</li>`;
      });
      html += `</ul>`;
    });

    html += `
      <p>🔥 Cardio: 20-30 min</p>
      <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  if(!elemento.innerText.trim()){
    alert("Primero genera algo bro 🔥");
    return;
  }

  let canvas = await html2canvas(elemento,{scale:2});
  let img = canvas.toDataURL("image/jpeg",1.0);

  let pdf = new jsPDF("p","mm","a4");
  let width = 210;
  let height = canvas.height * width / canvas.width;

  let y=10;
  while(height>0){
    pdf.addImage(img,"JPEG",0,y,width,height);
    height-=280;
    if(height>0){
      pdf.addPage();
      y=0;
    }
  }

  pdf.save(tipo+".pdf");
}

/* ===================== WHATS ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numero=prompt("Número cliente","52");

  if(!numero) return;

  let msg=`Hola ${nombre} 🔥 aquí tienes tu plan`;
  window.open(`https://wa.me/${numero}?text=${encodeURIComponent(msg)}`);
}
</script>


<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
