<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas y Rutinas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>
  <h3>⚠️ Solo uso interno</h3>
</section>

<section>
<div class="calculadora">
  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <!-- SEXO -->
  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <!-- OBJETIVO -->
  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <!-- TIPO DE DIETA -->
  <label>🔥 Nivel del cliente</label>
<select id="nivel">
  <option value="novato">Novato</option>
  <option value="intermedio">Intermedio</option>
  <option value="avanzado">Avanzado</option>
  <option value="competidor">Competidor</option>
</select>

  <!-- DÍAS ENTRENAMIENTO -->
  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7" placeholder="Ej: 3">

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️‍♂️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>
  <button onclick="descargarPDF('dieta')" style="margin-top:15px;">📄 Descargar PDF Dieta</button>
  <button onclick="descargarPDF('rutina')" style="margin-top:5px;">📄 Descargar PDF Rutina</button>
</div>
</section>

<div class="whats-box">
  <h3>🔥 Listo para tu plan personalizado?</h3>
  <p>Recibe dieta + rutina directamente en WhatsApp</p>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar al cliente
  </button>
  <span class="urgencia-whats">⚠️ Cupos limitados esta semana</span>
</div>


<script>
/* ===================== USAR PRO (FIX PRINCIPAL) ===================== */
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}

/* ===================== DIETA PRO ===================== */
function generarDietaPRO(datos){

  let {peso, altura, edad, objetivo, sexo, nivel} = datos;

  if(altura > 3) altura = altura / 100;

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo === "mujer" ? -161 : 5);
  let calorias = Math.round(bmr * 1.55);

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  function random(arr){
    return arr[Math.floor(Math.random()*arr.length)];
  }

  // 🔥 PROTE BASE SEGÚN NIVEL
  let proteBase = {
    novato: 1.6,
    intermedio: 1.8,
    avanzado: 2,
    competidor: 2.2
  };

  let proteina = Math.round(peso * proteBase[nivel]);

  const proteinas = [
    "150g pollo",
    "180g pescado",
    "150g carne magra",
    "4 claras + 1 huevo",
    "1 scoop proteína whey"
  ];

  const carbosNovato = [
    "2 tortillas de maíz",
    "1 taza arroz",
    "1 pan árabe",
    "1 taza avena"
  ];

  const carbosPro = [
    "1 taza arroz",
    "2 tortillas",
    "1/2 pan árabe",
    "1/2 taza avena"
  ];

  const grasas = [
    "1 cucharada aceite de oliva",
    "1/4 aguacate",
    "10 almendras"
  ];

  const verduras = [
    "1 taza ensalada",
    "1 taza verduras al vapor"
  ];

  const frutasDef = [
    "1 taza papaya",
    "1 taza melón",
    "1 manzana verde"
  ];

  const frutasVol = [
    "1 plátano",
    "1 manzana roja"
  ];

  let carbosLista = (nivel === "novato") ? carbosNovato : carbosPro;
  let frutasLista = objetivo === "definicion" ? frutasDef : frutasVol;

  let comidas = [];

  // 🔥 NOVATO (FLEXIBLE)
  if(nivel === "novato"){
    comidas.push({
      nombre:"Desayuno",
      proteina:"Huevos con jamón",
      carbos:"2 tortillas de maíz",
      grasa:"Aguacate",
      verdura:"",
      fruta:"1 taza fruta"
    });

    comidas.push({
      nombre:"Comida",
      proteina:"150g pollo",
      carbos:"1 taza arroz",
      grasa:"1 cucharada aceite",
      verdura:"1 taza ensalada",
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina:"Atún o pollo",
      carbos:"2 tostadas",
      grasa:"Aguacate",
      verdura:"Verduras libres",
      fruta:""
    });
  }

  // 🔥 INTERMEDIO / AVANZADO / COMPETIDOR
  else{

    comidas.push({
      nombre:"Desayuno",
      proteina: random(proteinas),
      carbos: random(carbosLista),
      grasa: random(grasas),
      verdura:"",
      fruta: random(frutasLista)
    });

    comidas.push({
      nombre:"Comida",
      proteina: random(proteinas),
      carbos: random(carbosLista),
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });

    comidas.push({
      nombre:"Pre-entreno",
      proteina:"1 scoop proteína whey",
      carbos: nivel === "competidor" ? "1/2 taza avena" : "1 plátano",
      grasa:"5 almendras",
      verdura:"",
      fruta:""
    });

    comidas.push({
      nombre:"Cena",
      proteina: random(proteinas),
      carbos: nivel === "competidor" ? "1 taza verduras" : random(carbosLista),
      grasa: random(grasas),
      verdura: random(verduras),
      fruta:""
    });

  }

  return {
    calorias,
    proteina,
    carbos: Math.round(calorias/4),
    grasa: Math.round(calorias*0.25/9),
    comidas
  };
}
/* ===================== MOSTRAR DIETA ===================== */
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
  let fecha = new Date().toLocaleDateString();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Plan Nutricional Personalizado</p>
    </div>

    <div style="text-align:center; margin-bottom:25px;">
      <h2>${nombre || "Cliente"}</h2>
      <p>📅 ${fecha}</p>
    </div>

    <div style="background:#111; padding:15px; border-radius:10px; margin-bottom:20px;">
      🔥 ${dieta.calorias} kcal<br>
      🥩 ${dieta.proteina}g proteína<br>
      🍚 ${dieta.carbos}g carbohidratos<br>
      🥑 ${dieta.grasa}g grasas
    </div>`;

  dieta.comidas.forEach(c=>{
    html += `<div class="card-meal no-break">
      <h4>🍽️ ${c.nombre}</h4>
      <ul>
        <li>🥩 ${c.proteina}</li>
        <li>🍚 ${c.carbos}</li>
        <li>🥑 ${c.grasa}</li>`;
    if(c.verdura) html += `<li>🥦 ${c.verdura}</li>`;
    if(c.fruta) html += `<li>🍎 ${c.fruta}</li>`;
    html += `</ul></div>`;
  });

  html += `</div>`;
  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== RUTINA ===================== */
function generarRutina(){

  let sexo = document.getElementById("sexo").value;
  let dias = parseInt(document.getElementById("diasGym").value) || 3;

  function getSplit(){
    if(sexo === "mujer"){
      if(dias <= 3){
        return ["Pierna + glúteo","Tren superior","Pierna"];
      }
      if(dias == 4){
        return ["Glúteo","Espalda","Pierna","Glúteo + abdomen"];
      }
      return ["Glúteo","Pierna","Espalda","Pierna","Glúteo"];
    } else {
      if(dias <= 3){
        return ["Pecho + tríceps","Espalda + bíceps","Pierna"];
      }
      if(dias == 4){
        return ["Pecho","Espalda","Pierna","Hombro + brazos"];
      }
      return ["Push","Pull","Pierna","Hombro","Pierna"];
    }
  }

  const ejercicios = {
    "Pecho":["Press banca 4x10","Aperturas 3x12","Fondos 3x12"],
    "Espalda":["Remo barra 4x10","Jalón polea 3x12","Peso muerto 3x8"],
    "Pierna":["Sentadilla 4x10","Prensa 3x12","Femoral 3x12","Pantorrilla 4x15"],
    "Hombro":["Press militar 4x10","Elevaciones laterales 3x12"],
    "Bíceps":["Curl barra 3x12","Curl martillo 3x12"],
    "Tríceps":["Fondos 3x12","Extensión polea 3x12"],
    "Glúteo":["Hip thrust 4x12","Patada glúteo 3x15"],
    "Tren superior":["Rutina completa tren superior"],
    "Glúteo + abdomen":["Hip thrust","Plancha 3x60s"],
    "Push":["Press banca","Press militar","Fondos"],
    "Pull":["Remo","Curl bíceps"]
  };

  let split = getSplit();

  let html = `<div class="dieta-card">
    <div style="text-align:center; border-bottom:2px solid #d4af37; padding-bottom:15px; margin-bottom:20px;">
      <h1 style="color:#d4af37;">🔥 Charly Fitness</h1>
      <p>Rutina PRO Personalizada</p>
    </div>`;

  split.forEach((dia, i)=>{
    html += `<div class="card-meal">
      <h4>🏋️ Día ${i+1} - ${dia}</h4>`;

    let grupos = dia.split("+");

grupos.forEach(g=>{
  let grupo = g.trim().toLowerCase();

  // normalizar nombres
  if(grupo === "bíceps") grupo = "Bíceps";
  if(grupo === "tríceps") grupo = "Tríceps";
  if(grupo === "pecho") grupo = "Pecho";
  if(grupo === "espalda") grupo = "Espalda";
  if(grupo === "pierna") grupo = "Pierna";
  if(grupo === "hombro") grupo = "Hombro";
  if(grupo === "glúteo") grupo = "Glúteo";

  let lista = ejercicios[grupo] || ["Ejercicio base 3x12"];

      html += `<strong>${grupo}</strong><ul>`;
      lista.forEach(e=>{
        html += `<li>${e}</li>`;
      });
      html += `</ul>`;
    });

    html += `
      <p>🔥 Cardio: 20-30 min</p>
      <p>😴 Descanso: 60-90 seg</p>
    </div>`;
  });

  html += `</div>`;

  document.getElementById("resultadoPRO").innerHTML = html;
}

/* ===================== PDF ===================== */
async function descargarPDF(tipo){
  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("resultadoPRO");

  if(!elemento.innerText.trim()){
    alert("Primero genera algo bro 🔥");
    return;
  }

  const nombre = document.getElementById("nombreCliente").value || "Cliente";

  let canvas = await html2canvas(elemento,{
    scale:2,
    useCORS:true,
    backgroundColor:"#ffffff"
  });

  let imgData = canvas.toDataURL("image/jpeg",1.0);
  let pdf = new jsPDF("p","mm","a4");

  const imgWidth = 210;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  pdf.addImage(imgData,"JPEG",0,10,imgWidth,imgHeight>280?280:imgHeight);
  pdf.save(`${tipo}-${nombre}.pdf`);
}

/* ===================== WHATS ===================== */
function enviarWhats(){
  let nombre=document.getElementById("nombreCliente").value;
  let numero=prompt("Número cliente (52XXXXXXXXXX)","52");

  if(!numero){
    alert("Falta número bro");
    return;
  }

  let msg=`Hola ${nombre}, gracias por tu compra 🔥%0A%0AAquí tienes tu plan.%0ADisfrútalo 💪`;

  window.open(`https://wa.me/${numero}?text=${msg}`);
}
</script>



<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
