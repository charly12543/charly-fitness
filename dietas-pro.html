<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas PRO</title>
<link rel="stylesheet" href="styleDietas.css">
</head>

<body>

<section class="hero">
  <h1>🔥 Calculadora PRO (Privada)</h1>
  <p>Solo para generar dietas personalizadas</p>
</section>

<section>

<div class="calculadora">
<input type="text" id="nombreCliente" placeholder="Nombre del cliente">
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
<input type="number" id="edad" placeholder="Edad">

<select id="objetivo">
  <option value="definicion">Definición</option>
  <option value="volumen">Volumen</option>
</select>

<button onclick="usarPro()">Generar dieta PRO</button>

<div id="resultadoPRO"></div>

</div>

</section>

<button onclick="descargarPDF()">📄 Descargar PDF</button>






  
  

<script>
function usarPro(){
  let datos = {
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    objetivo: document.getElementById("objetivo").value
  };
  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }
 let dieta = generarDietaPRO(datos);
  mostrarDieta(dieta);
}
</script>

<script>
function generarDietaPRO(datos){
 let {peso, altura, edad, objetivo} = datos;
 if(altura > 3){ altura = altura / 100; }
  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + 5;
  let calorias = bmr * 1.55;

  if(objetivo === "definicion") calorias -= 400;
  if(objetivo === "volumen") calorias += 300;

  let proteina = peso * 2;
  let grasa = (calorias * 0.25) / 9;
  let carbos = (calorias - (proteina*4 + grasa*9)) / 4;

  const proteinas = ["pollo", "carne", "atún", "huevo"];
  const carbosLista = ["arroz", "papa", "avena"];
  const grasasLista = ["aguacate", "aceite"];

  function random(arr){
    return arr[Math.floor(Math.random() * arr.length)];
  }

  let comidas = [];

  for(let i=0;i<4;i++){
    comidas.push({
      proteina: random(proteinas),
      carbos: random(carbosLista),
      grasa: random(grasasLista)
    });
  }

  return {calorias, proteina, carbos, grasa, comidas};
}
</script>


  
<script>
function mostrarDieta(dieta){
  let nombre = document.getElementById("nombreCliente").value;
 let html = `
    <div class="dieta-card">

      <div style="text-align:center;">
        <h2>🔥 Charly Fitness</h2>
        <p>Plan personalizado</p>
        <p><b>Cliente:</b> ${nombre || "Cliente"}</p>
      </div>

      <div class="card-header">
        <h3>🔥 Plan PRO</h3>
        <p>${dieta.calorias.toFixed(0)} kcal</p>
      </div>
  `;

  dieta.comidas.forEach((c, i)=>{
    html += `
      <div class="card-meal">
        <h4>🍽️ Comida ${i+1}</h4>
        <ul>
          <li>🥩 ${c.proteina}</li>
          <li>🍚 ${c.carbos}</li>
          <li>🥑 ${c.grasa}</li>
        </ul>
      </div>
    `;
  });

  html += `
      <div class="card-macros">
        🥩 ${dieta.proteina.toFixed(0)}g |
        🍚 ${dieta.carbos.toFixed(0)}g |
        🥑 ${dieta.grasa.toFixed(0)}g
      </div>

    </div>
  `;

  document.getElementById("resultadoPRO").innerHTML = html;
}
</script>

<script>
function descargarPDF(){
 const elemento = document.getElementById("resultadoPRO");
 if(!elemento.innerHTML){
    alert("Primero genera la dieta bro 🔥");
    return;
  }
  const opciones = {
    margin: 10,
    filename: `dieta-${nombre}.pdf`,
    image: { type: 'jpeg', quality: 0.98 },
    html2canvas: { scale: 2 },
    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
  };

  html2pdf().set(opciones).from(elemento).save();
}
</script>

  
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</body>
</html>
